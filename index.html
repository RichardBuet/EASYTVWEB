/* 1. Base y Reset */
body, html {
    background: var(--bg-dark);
    margin: 0; padding: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden; /* Evita el scroll global molesto */
}

/* 2. Barra Superior */
#top-bar {
    height: 50px;
    background: #010409;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    border-bottom: 1px solid #30363d;

#top-bar h2 {    
    letter-spacing: 1px;

}
#playList div {

/* 6. Lista de Canales */

     max-width: 34%;

/* Botones de la lista (Mejorados para TV/Móvil) */

/* 7. Modal (Formulario de carga) - ARREGLADO */

}

</style>

<body>

        </div>

        <div id="playList"></div>

</div>

<div id="install-banner"  style="height: 20px;">
    📲 Instalar Easy TV
</div>

<script>
// ================== VARIABLES ==================
let autoNextEnabled = false;
let channelsGlobal = [];
let currentIndex = 0;
let currentLink = null;
window.showingFavorites = false;

const defaultM3U = "https://richardbuet.github.io/EASYTVWEB/AIO2506V0.m3u";

// ================== FAVORITOS ==================
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

function saveFavorites() {
    localStorage.setItem("favorites", JSON.stringify(favorites));
}

function toggleFavoriteCurrent() {
    if (!currentLink) return;

    let name = $("#nombreCanal").text();
    let index = favorites.findIndex(f => f.url === currentLink);

    if (index !== -1) {
        favorites.splice(index, 1);
    } else {
        favorites.unshift({ name, url: currentLink });
    }

    saveFavorites();
    updateFavButton();
}

function updateFavButton() {
    let exists = favorites.some(f => f.url === currentLink);
    $("#fav-btn").text(exists ? "✔" : "⭐");
}

// ================== PLAYER ==================
function playHLS(url) {

    var player = videojs('my-video');

    player.pause();
    player.src({ src: url, type: 'application/x-mpegURL' });
    player.play();

    currentLink = url;

    $("#link-info-container")
        .html("🔄 Buscando señal...")
        .show();

    player.one('playing', function () {
        $("#link-info-container").fadeOut();
    });

    player.one('error', function () {
        $("#link-info-container")
            .html("❌ Señal fuera de servicio")
            .show();
    });
}

// ================== PARSER ==================
function getChannelData(line) {
    const nameMatch = line.match(/,(.*)/);
    const groupMatch = line.match(/group-title="([^"]*)"/);

    return {
        name: nameMatch ? nameMatch[1].trim() : "Canal",
        group: groupMatch ? groupMatch[1].trim() : "General"
    };
}

// ================== CARGA LISTA ==================
function loadChannels(url) {

    window.showingFavorites = false;
    $("#playList").removeClass("favorites-mode");

    $("#playList").html("⏳ Cargando lista...");

    $.get(url, function (data) {

        let lines = data.split("\n");
        let channels = [];
        let current = {};

        lines.forEach(line => {

            if (line.startsWith("#EXTINF")) {
                let d = getChannelData(line);
                current.name = d.name;
                current.group = d.group;

            } else if (line && !line.startsWith("#")) {

                current.url = line;

                if (current.name) {
                    channels.push({...current});
                }

                current = {};
            }
        });

        channelsGlobal = channels;

        let grouped = {};
        channels.forEach(c => {
            if (!grouped[c.group]) grouped[c.group] = [];
            grouped[c.group].push(c);
        });

        $("#playList").empty();

        for (let g in grouped) {
            $("#playList").append(`<div class="group-title">${g}</div>`);

            grouped[g].forEach(c => {
                $("#playList").append(`
                    <button class="list-item" data-url="${c.url}">
                        ${c.name}
                    </button>
                `);
            });
        }

    });
}

// ================== FAVORITOS VIEW ==================
function renderFavorites() {

    let data = JSON.parse(localStorage.getItem("favorites")) || [];

    $("#playList").empty().addClass("favorites-mode");

    if (!data.length) {
        $("#playList").html("⭐ Sin favoritos");
        return;
    }

    channelsGlobal = data;

    data.forEach(c => {
        $("#playList").append(`
            <button class="list-item" data-url="${c.url}">
                ${c.name}
            </button>
        `);
    });
}

// ================== HISTORIAL ==================
function saveM3U(url) {

    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];

    history = history.filter(h => h.url !== url);
    history.unshift({ name: url, url });

    history = history.slice(0, 15);

    localStorage.setItem("m3uHistory", JSON.stringify(history));
}

function renderHistory() {

    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];

    $("#m3u-history").empty();

    history.forEach(h => {
        $("#m3u-history").append(`
            <div class="history-item" data-url="${h.url}">
                🔗 ${h.name}
            </div>
        `);
    });
}

// ================== AUTO NEXT ==================
function handlePlayerError() {

    var player = videojs('my-video');

    player.on('error', function () {

        player.pause();

        if (autoNextEnabled) {

            currentIndex++;

            if (currentIndex >= channelsGlobal.length) return;

            let next = channelsGlobal[currentIndex];

            playHLS(next.url);
            $("#nombreCanal").text(next.name);

        } else {

            $("#link-info-container")
                .html("❌ Señal fuera de servicio")
                .show();
        }
    });
}

// ================== READY ==================
$(document).ready(function () {

    loadChannels(defaultM3U);
    renderHistory();
    handlePlayerError();

    $("#link-info-container").hide();


    $("#nombreCanal").click(function (e) {
    e.stopPropagation();

    if (!currentLink) return;

    $("#link-info-container")
        .html(currentLink)
        .show();
});
    

    $("#nombreCanal").dblclick(function (e) {
    e.stopPropagation();

    if (!currentLink) return;

    navigator.clipboard.writeText(currentLink)
        .then(() => {
            $("#link-info-container")
                .html("📋 Link copiado")
                .show()
                .fadeOut(1500);
        })
        .catch(() => {
            alert("No se pudo copiar");
        });
});
 
    // ABRIR MODAL
    $("#top-bar h2").click(function () {
        $("#overlay, #form-container").show();
    });

    // CERRAR
    $("#exit-button").click(function () {
        $("#overlay, #form-container").hide();
    });

    // LIMPIAR
    $("#clear-button").click(function () {
        $("#m3u-url").val("");
    });

    // PEGAR
    $("#paste-button").click(async function () {
        try {
            const text = await navigator.clipboard.readText();
            $("#m3u-url").val(text);
        } catch {
            alert("No se pudo acceder al portapapeles");
        }
    });

    // CARGAR
    $("#ok-button").click(function () {

        let url = $("#m3u-url").val().trim();

        if (url) {
            saveM3U(url);
            loadChannels(url);
            renderHistory();
        }

        $("#overlay, #form-container").hide();
    });

    // DEFAULT
    $("#default-button").click(function () {
        loadChannels(defaultM3U);
        $("#overlay, #form-container").hide();
    });

    // PRESETS
    $(".preset").click(function () {
        loadChannels($(this).data("url"));
        $("#overlay, #form-container").hide();
    });

    // HISTORIAL CLICK
    $("#m3u-history").on("click", ".history-item", function () {
        loadChannels($(this).data("url"));
        $("#overlay, #form-container").hide();
    });

    // BORRAR HISTORIAL
    $("#clear-history").click(function () {
        if (confirm("¿Borrar historial?")) {
            localStorage.removeItem("m3uHistory");
            renderHistory();
        }
    });

    // FAVORITOS
    $("#favorites-button").click(function () {
        window.showingFavorites = true;
        renderFavorites();
        $("#overlay, #form-container").hide();
    });

    $("#fav-btn").click(toggleFavoriteCurrent);

    // CLICK CANAL
    $("#playList").on("click", ".list-item", function () {

        let url = $(this).data("url");

        currentIndex = channelsGlobal.findIndex(c => c.url === url);

        playHLS(url);
        $("#nombreCanal").text($(this).text());

        updateFavButton();
    });

    // AUTO NEXT BTN
    $("#auto-next-btn").click(function () {
        autoNextEnabled = !autoNextEnabled;
        $(this).text(autoNextEnabled ? "Auto ▶ ON" : "Auto ▶ OFF");
    });

});

// ================== ANIMACIÓN ==================
document.addEventListener('DOMContentLoaded', function () {
    let el = document.getElementById('nombreCanal');
    let timer;

    window.onmousemove = function () {
        clearTimeout(timer);
        el.style.opacity = "1";

        timer = setTimeout(() => {
            el.style.opacity = "0.3";
        }, 8000);
    };
});

// ================== TÍTULO DINÁMICO ==================
function actualizarTitulo() {
    let el = document.getElementById("nombreCanal");
    let nombre = el?.textContent?.trim();
    document.title = nombre ? `EASY TV - ${nombre}` : "EASY TV";
}

document.addEventListener("DOMContentLoaded", () => {

    actualizarTitulo();

    const el = document.getElementById("nombreCanal");

    if (el) {
        const observer = new MutationObserver(actualizarTitulo);
        observer.observe(el, {
            childList: true,
            subtree: true
        });
    }
});

</script>
    
<script>
    
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    // mostrar banner
    $("#install-banner").fadeIn();
});

// click → instalar
$("#install-banner").click(async function () {

    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    const { outcome } = await deferredPrompt.userChoice;

    console.log("Resultado instalación:", outcome);

    deferredPrompt = null;

    $("#install-banner").fadeOut();
});

</script>

<script>
    if (window.matchMedia('(display-mode: standalone)').matches) {
    $("#install-banner").hide();
}
</script>

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("SW registrado"))
        .catch(err => console.log("SW error", err));
}
</script>
