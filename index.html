/* 🔥 overlay de error sin bloquear */

    z-index: 3;
    pointer-events: none;
}

:not(:root):fullscreen {

    height: 100%;
}

/* 🔥 botón play */
.vjs-big-play-button {

<script>

<script>
// ================== VARIABLES ==================
let autoNextEnabled = false;
let channelsGlobal = [];
let currentIndex = 0;

let currentLink = "";
const defaultM3U = "https://richardbuet.github.io/EASYTVWEB/AIO2506V0.m3u";


// 🔍 BUSCADOR COMPLETO
$("#search")
.on("focus", function() {
    this.select();
})
.on("input", function() {

    let value = $(this).val().toLowerCase();

    $("#no-results").remove();

    // 🔍 Filtrar botones
    $("#playList button").each(function() {
        let match = $(this).text().toLowerCase().includes(value);
        $(this).css("display", match ? "" : "none");
    });

    // 🔥 Ocultar grupos
    $("#playList .group-title").each(function() {

        let group = $(this);

        let hasVisible = group
            .nextUntil(".group-title")
            .filter("button:visible")
            .length > 0;

        group.css("display", hasVisible ? "" : "none");
    });

    // ⚠️ sin resultados
    if ($("#playList button:visible").length === 0) {

        $(".group-title").hide();

        $("#playList").append(`
            <div id="no-results" style="text-align:center; padding:10px;">
                ❌ Sin resultados
            </div>
        `);
    }

    // 🔄 reset
    if (value === "") {
        $("#playList button").show();
        $("#playList .group-title").show();
        $("#no-results").remove();
    }

});


// 🎬 PLAYER
function playHLS(url) {

    var player = videojs('my-video');

    // 🔥 limpiar estado anterior SIEMPRE
    player.pause();
    player.src("");
    player.reset();

    // 🔥 mostrar imagen de "sin señal"
    player.poster("https://img.freepik.com/free-photo/modern-home-interior-with-comfortable-sofa-window-generative-ai_188544-19459.jpg");

    // 🔥 pequeño delay (CLAVE para evitar fallos)
    setTimeout(() => {

        player.src({
            src: url,
            type: 'application/x-mpegURL'
        });

        player.play();

    }, 150);

    currentLink = url;

    // 🔥 evitar duplicar eventos (MUY IMPORTANTE)
    player.off('playing');
    player.off('waiting');

    player.on('playing', function () {
        $("#link-info-container").fadeOut();
    });

    player.on('waiting', function () {
        if (autoNextEnabled) {
            $("#link-info-container")
                .html("🔄 Buscando señal...")
                .show();
        }
    });

    // 🔥 manejar error correctamente
    player.off('error');
    player.on('error', function () {

        console.log("Error de señal");

        player.pause();
        player.src("");
        player.reset();

        player.poster("sin-senal.jpg");

        if (!autoNextEnabled) {
            $("#link-info-container")
                .html("❌ Señal fuera de servicio")
                .show();
        }
    });
}
// 🧠 PARSER
function getChannelData(line) {
    const nameMatch = line.match(/,(.*)/);
    const groupMatch = line.match(/group-title="([^"]*)"/);

    let name = nameMatch ? nameMatch[1].trim() : "Unknown";
    let group = groupMatch ? groupMatch[1].trim() : "Canales Generales";

    if (!group ||
        group.toLowerCase() === "undefined" ||
        group.toLowerCase() === "n/a" ||
        group.toLowerCase() === "none"
    ) {
        group = "Canales de TV";
    }

    return { name, group };
}


// 📡 CARGA DE LISTA
function loadChannels(url) {

    $("#playList").html(`
        <div style="text-align:center; padding:20px;">
            ⏳ Cargando lista...
        </div>
    `);

    $.ajax({
        type: "GET",
        url: url,
        timeout: 10000,

        success: function (message) {

            let lines = message.split("\n");
            let channels = [];
            let currentChannel = { name: "", url: "", group: "General" };

            lines.forEach(line => {
                line = line.trim();

                if (line.startsWith("#EXTINF")) {
                    let data = getChannelData(line);
                    currentChannel.name = data.name;
                    currentChannel.group = data.group;

                } else if (line !== "" && !line.startsWith("#")) {

                    currentChannel.url = line;

                    if (currentChannel.name && currentChannel.url) {
                        let groups = currentChannel.group.split(";");

                        groups.forEach(g => {
                            channels.push({
                                name: currentChannel.name,
                                url: currentChannel.url,
                                group: g.trim() || "General"
                            });
                        });
                    }

                    currentChannel = { name: "", url: "", group: "General" };
                }
            });

            // 🔥 eliminar duplicados (FIX)
            let seen = new Set();
            channels = channels.filter(ch => {
                let key = ch.name + ch.group;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            // 🔥 GUARDAR LISTA GLOBAL (CLAVE)
            channelsGlobal = channels;

            if (channels.length === 0) {
                $("#playList").html(`⚠️ Lista sin canales`);
                return;
            }

            // 🔥 AGRUPAR
            let grouped = {};

            channels.forEach(ch => {
                if (!grouped[ch.group]) grouped[ch.group] = [];
                grouped[ch.group].push(ch);
            });

            // 🎛️ RENDER
            $("#playList").empty();

            for (let group in grouped) {

                $("#playList").append(`
                    <div class="group-title" style="color:#00ffcc; font-weight:bold; margin-top:10px;">
                        ${group}
                    </div>
                `);

                grouped[group].forEach(channel => {
                    $("#playList").append(`
                        <button class='list-item' data-url='${channel.url}'>
                            ${channel.name}
                        </button>
                    `);
                });
            }
        },

        error: function (xhr, status, error) {

            let mensaje = "❌ Error al cargar la lista";

            if (status === "timeout") mensaje = "⏱️ La carga tardó demasiado";
            if (xhr.status === 404) mensaje = "❌ Lista no encontrada";

            $("#playList").html(`
                <div style="text-align:center; padding:20px;">
                    ${mensaje}<br>
                    <button onclick="cargarDefault()">🔄 Lista original</button>
                </div>
            `);
        }
    });
};


// 🔁 VOLVER A LISTA ORIGINAL
function cargarDefault() {
    $("#m3u-url").val(defaultM3U);
    loadChannels(defaultM3U);
};


// 🎛️ EVENTOS
$(document).ready(function () {

    loadChannels(defaultM3U);
    renderHistory();

    // ▶️ CLICK CANAL
    $("#playList").on('click', 'button', function() {
        let url = $(this).data('url');
        let nombre = $(this).text();
        // 🔥 índice correcto
        currentIndex = channelsGlobal.findIndex(c => c.url === url);
        playHLS(url);
        $("#nombreCanal").text(nombre);
        // 🔥 NUEVO: marcar activo
        $(".list-item").removeClass("active");
        $(this).addClass("active");
    });



    // 🪟 ABRIR MODAL
    $("#top-bar h2").click(function () {
        $("#overlay").show();
        $("#form-container").show();
    });

    // 📥 CARGAR URL
    $("#ok-button").click(function () {
       // let url = $("#m3u-url").val("");

    console.log("Error de señal");

    player.src("");

    // 🔥 mensaje (opcional)
  
        player.errorDisplay.fillWith('Señal fuera de servicio...');

        if (autoNextEnabled) {

            let attempts = 0;

                currentIndex++;

                if (currentIndex >= channelsGlobal.length || attempts > 10) {
                    console.log("No se encontró canal válido");

$("#paste-button").click(async function () {
    try {
        const text = await navigator.clipboard.readText();
        $("#m3u-url").val(text);
    } catch (err) {
        alert("No se pudo acceder al portapapeles");
    }
});


function saveM3U(url) {

    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];

    let u = new URL(url);

    let file = u.pathname.split("/").pop() || "lista";
    let shortName = u.hostname + " / " + file;

    let item = {
        name: shortName,
        url: url
    };

    // 🔥 evitar duplicados por URL completa
    history = history.filter(h => h.url !== url);

    // 🔥 agregar al inicio
    history.unshift(item);

    // 🔥 limitar a 5 elementos
    history = history.slice(0, 5);

    // 🔥 guardar
    localStorage.setItem("m3uHistory", JSON.stringify(history));
}



function renderHistory() {

    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];

    $("#m3u-history").empty();

    history.forEach(item => {
        $("#m3u-history").append(`
            <div class="history-item" data-url="${item.url}">
                🔗 ${item.name}
            </div>
        `);
    });
}

$("#m3u-history").on("click", ".history-item", function () {

    let url = $(this).data("url");

    $("#m3u-url").val(url);
    loadChannels(url);

    $("#overlay").hide();
    $("#form-container").hide();
});

$("#clear-history").click(function () {

    if (confirm("¿Borrar historial de listas?")) {

        localStorage.removeItem("m3uHistory");

        renderHistory(); // refresca UI

        $("#m3u-url").val(""); // opcional limpiar input
    }
    if (!localStorage.getItem("m3uHistory")) {
    $("#clear-history").hide();
}
});

</script>
