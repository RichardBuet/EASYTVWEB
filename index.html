    color: var(--text);
    height: 100vh;
    overflow: hidden; /* Evita el scroll global molesto */
}

/* 2. Barra Superior */
#top-bar {
    height: 50px;
    background: #010409;
    display: flex;
    align-items: center;
    justify-content: flex-start;

#top-bar h2 {

/* 3. Overlays del Video (Nombre e Info) */

/* 5. Contenedor del Reproductor */

/* 8. RESPONSIVE (Móvil - Vertical) */
@media  (max-aspect-ratio: 1.20) {

<script>
// ================== VARIABLES ==================
let autoNextEnabled = true;
let channelsGlobal = [];
let currentIndex = 0;
let currentLink = null;
let isAutoSearching = false;
window.showingFavorites = false;
const defaultM3U = "https://richardbuet.github.io/EASYTVWEB/AIO260501V1.m3u";

// AIO260501V0.m3u
    // AIO2506V0
    
// ================== FAVORITOS ==================
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

function saveFavorites() {
    localStorage.setItem("favorites", JSON.stringify(favorites));
}

function toggleFavoriteCurrent() {
    if (!currentLink) return;
    let name = $("#nombreCanal").text();
    let index = favorites.findIndex(f => f.url === currentLink);
    if (index !== -1) {
        favorites.splice(index, 1);
    } else {
        favorites.push({ name, url: currentLink });
    }
    saveFavorites();
    updateFavButton();
    // 🔥 REFRESCAR SI ESTÁS EN FAVORITOS
    if (window.showingFavorites) {
        renderFavorites();
    }
}

function updateFavButton() {
    let exists = favorites.some(f => f.url === currentLink);
    $("#fav-btn").text(exists ? "✔" : "⭐");
}

function marcarCanalActivo() {
    if (!currentLink) return;
    // 🔥 LIMPIEZA GLOBAL REAL
    document.querySelectorAll(".list-item.active")
        .forEach(el => el.classList.remove("active"));
    let btn = document.querySelector(`.list-item[data-url="${currentLink}"]`);
    if (btn) {
        btn.classList.add("active");
    }
}

// 🔍 BUSCADOR
$("#search")

.on("focus", function() {
    this.select();
})

.on("input", function() {
    let value = $(this).val().toLowerCase();
    $("#no-results").remove();

    $("#playList button").each(function() {
        let match = $(this).text().toLowerCase().includes(value);
        $(this).css("display", match ? "" : "none");
    });

    $("#playList .group-title").each(function() {
        let group = $(this);
        let hasVisible = group
            .nextUntil(".group-title")
            .filter("button:visible")
            .length > 0;
        group.css("display", hasVisible ? "" : "none");
    });

    if ($("#playList button:visible").length === 0) {
        $(".group-title").hide();
        $("#playList").append(`
            <div id="no-results" style="text-align:center; padding:10px;">
                ❌ Sin resultados
            </div>
        `);
    }

    if (value === "") {
        $("#playList button").show();
        $("#playList .group-title").show();
        $("#no-results").remove();
    }
});

// ================== PLAYER ==================
function playHLS(url) {

    var player = videojs('my-video');
        player.pause();
      //  player.src({ src: url, type: 'application/x-mpegURL' });
        let type = "application/x-mpegURL";
        if (url.endsWith(".mp4")) {
            type = "video/mp4";
        } else if (url.endsWith(".mp3")) {
            type = "audio/mpeg";
        } else if (url.endsWith(".ts")) {
            type = "video/mp2t";
        } else if (url.endsWith(".m3u8")) {
            type = "application/x-mpegURL";
        }
        player.src({ src: url, type: type });
        player.play();
        currentLink = url;
    if (!isAutoSearching) {
        $("#link-info-container")
            .html("🔄 Buscando señal...")
            .show();
    }
    player.one('playing', function () {
        $("#link-info-container").fadeOut();
    });

    player.one('error', function () {
    if (!isAutoSearching) {
        $("#link-info-container")
        .html("🔥 Señal fuera de servicio")
        .show();
        }
    });
}

// ================== PARSER ==================
function getChannelData(line) {
    const nameMatch = line.match(/,(.*)/);
    const groupMatch = line.match(/group-title="([^"]*)"/);
    let name = nameMatch ? nameMatch[1].trim() : "Unknown";
    let group = groupMatch ? groupMatch[1].trim() : "Canales Generales";
    if (!group ||
        group.toLowerCase() === "undefined" ||
        group.toLowerCase() === "n/a" ||
        group.toLowerCase() === "none"
    ) {
        group = "Canales de TV";
    }
    return { name, group };
}

// ================== CARGA LISTA ==================
function loadChannels(url) {
    // 🔥 SALIR DE FAVORITOS SI CARGO NUEVA LISTA
    window.showingFavorites = false;
    $("#playList").removeClass("favorites-mode");
    // 🔄 loading con estilo
    $("#playList").html(`
        <div class="loading-list">⏳ Cargando lista...</div>
    `);

    $.ajax({
        type: "GET",
        url: url,
        timeout: 15000,
        success: function (message) {
            let lines = message.split("\n");
            let channels = [];
            let currentChannel = { name: "", url: "", group: "General" };
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith("#EXTINF")) {
                    let data = getChannelData(line);
                    currentChannel.name = data.name.substring(0, 30);
                    currentChannel.group = data.group;
                } else if (line !== "" && !line.startsWith("#")) {
                    currentChannel.url = line;
                    if (currentChannel.name && currentChannel.url) {
                        let groups = currentChannel.group.split(";");
                        groups.forEach(g => {
                            channels.push({
                                name: currentChannel.name,
                                url: currentChannel.url,
                                group: g.trim() || "General"
                            });
                        });
                    }
                    currentChannel = { name: "", url: "", group: "General" };
                }
            });

            // 🔥 eliminar duplicados
            let seen = new Set();
            channels = channels.filter(ch => {
                let key = ch.name + ch.group;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            channelsGlobal = channels;

            // ❌ lista vacía

            // if (channels.length === 0) {
            //     $("#playList").html(`
            //         <div class="loading-list">
            //             ⚠️ Lista sin canales
            //         </div>
            //     `);
            //     return;
            // }

            if (channels.length === 0) {

                let name = url.split("/").pop() || "Stream";

                // 🔥 limpiar query (opcional pero recomendado)
                name = name.split("?")[0];

                // 🔥 limitar a 30 caracteres
                if (name.length > 30) {
                    name = name.substring(0, 30) + "...";
                }

                let icon = getIconByUrl(url);

                $("#playList").html(`
                    <div class="loading-list">
                        ⚠️ Lista sin canales<br><br>
                        👉 Probando como stream
                    </div>

                    <button class="list-item active" data-url="${url}">
                        ${icon} ${name}
                    </button>
                `);

                // 🔥 reproducir directo
                currentLink = url;
                playHLS(url);
                updateFavButton();

                return;
            }


            // 🔥 agrupar
            let grouped = {};
            channels.forEach(ch => {
                if (!grouped[ch.group]) grouped[ch.group] = [];
                grouped[ch.group].push(ch);
            });

            $("#playList").empty();
            for (let group in grouped) {
                $("#playList").append(`
                    <div class="group-title">${group}</div>
                `);
                grouped[group].forEach(channel => {
                    $("#playList").append(`
                        <button class='list-item' data-url='${channel.url}'>
                            ${channel.name}
                        </button>
                    `);
                });
            }

            // 🔥 restaurar selección
            setTimeout(() => {
                marcarCanalActivo();
            }, 100);
            // 🔥 restaurar ventana
            $("#playList").scrollTop(0);
        },


        error: function (xhr, status, error) {

            let mensaje = "❌ Error al cargar la lista";
        
            // 🔥 CORS (el caso que te está pasando)
            if (xhr.status === 0) {
                mensaje = `
                    🚫 Lista bloqueada por el servidor (CORS)<br><br>
                    👉 Descargala y cargala como archivo<br>
                    📂 o usá otra fuente
                `;
            }
        
            // ⏱️ timeout
            else if (status === "timeout") {
                mensaje = "⏱️ La carga tardó demasiado";
            }
        
            // ❌ 404
            else if (xhr.status === 404) {
                mensaje = "❌ Lista no encontrada";
            }
        
            $("#playList").html(`
                <div style="text-align:center; padding:20px;">
                    ${mensaje}
                    <br><br>
                    <button onclick="cargarDefault()">🔄 Lista original</button>
                </div>
            `);
        }

    });
}

// 🔁 VOLVER A LISTA ORIGINAL

// ================== FAVORITOS VIEW ==================

// ================== HISTORIAL ==================
function saveM3U(url) {
    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
    let shortName;
    try {
        let u = new URL(url);
        let file = u.pathname.split("/").pop() || "lista";
        shortName = u.hostname + " / " + file;
    } catch {
        shortName = url; // fallback si no es URL válida
    }

    history = history.filter(h => h.url !== url);
    history.unshift({
        name: shortName,
        url: url
    });
    history = history.slice(0, 15);
    localStorage.setItem("m3uHistory", JSON.stringify(history));
}

function renderHistory() {
    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
    $("#m3u-history").empty();
    history.forEach(h => {
        let displayName;
        // 🔥 SI ES LOCAL
        if (h.url.startsWith("local-file-")) {

            displayName = h.name;
        } else {
            try {
                let u = new URL(h.url);
                let file = u.pathname.split("/").pop() || "lista";
                displayName = u.hostname + " / " + file;
            } catch {
                displayName = h.url;
            }
        }
        let icon = h.url.startsWith("local-file-") ? "📂" : "🌐";
        $("#m3u-history").append(`
            <div class="history-item" data-url="${h.url}" style="display:flex; justify-content:space-between; align-items:center;">
                <span style="flex:1; overflow:hidden; text-overflow:ellipsis;">
                    ${icon} ${displayName}
                </span>
                <span class="delete-history" data-url="${h.url}" style="cursor:pointer; color:red; margin-left:8px;">
                    ❌
                </span>
            </div>
        `);
    });
}

// ================== AUTO NEXT ==================
function getVisibleChannels() {
    let list = [];
    $("#playList .list-item:visible").each(function () {
        list.push({
            name: $(this).text(),
            url: $(this).data("url")
        });
    });
    return list;
}

function handlePlayerError() {
    var player = videojs('my-video');
    player.off('error'); // 🔥 evitar duplicados
    player.on('error', function () {
        player.pause();
        if (!autoNextEnabled) {
            // 🔥 SOLO mostrar error si NO está buscando
            if (!isAutoSearching) {
                $("#link-info-container")
                    .html("🔥 Señal fuera de servicio")
                    .show();
            }
            return;
        }
        let attempts = 0;
        const MAX_ATTEMPTS = 10;
        isAutoSearching = true; // 🔥 ACTIVAR MODO BÚSQUEDA

        function tryNext() {
            let visibleList = getVisibleChannels();
            let currentPos = visibleList.findIndex(c => c.url === currentLink);
            if (currentPos === -1) return;
            let nextIndex = currentPos + 1;
            if (nextIndex >= visibleList.length || attempts >= MAX_ATTEMPTS) {
                console.log("No se encontró canal válido");
                isAutoSearching = false; // 🔥 DESACTIVAR

                $("#link-info-container")
                    .html("❌ No se encontró señal disponible")
                    .show();
                return;
            }
            let next = visibleList[nextIndex];
            console.log("🔄 Probando:", next.name);
            // 🔥 mensaje visual
            $("#link-info-container")
                .stop(true, true)
                .html(`<div style="display:block;">🔄 Probando:<br><b>${next.name}</b></div>`)
                .show()
            // 🔥 actualizar estado
            currentLink = next.url;
            currentIndex = nextIndex;
            playHLS(next.url);
            $("#nombreCanal").text(next.name);
            marcarCanalActivo();
            attempts++;
            setTimeout(() => {
            isAutoSearching = false;
            $("#link-info-container").fadeOut();
            }, 2500);
        }
        tryNext();
    });

    // 🔥 cuando el video arranca correctamente
    player.on('playing', function () {
        isAutoSearching = false;
            $("#link-info-container")
        .stop(true, true)
        .fadeOut();
    });
}



// ================== UTIL ==================
function getIconByUrl(url) {
    if (url.startsWith("local-file-")) return "📂";
    if (url.includes(".m3u8")) return "📺";
    if (url.includes(".mp4")) return "🎬";
    if (url.includes(".mp3")) return "🎧";
    if (url.includes(".ts")) return "📡";
    return "🌐";
}

// ================== PLAY DIRECT ==================
function playDirectStream(url) {

    currentLink = url;

    let player = videojs('my-video');

    player.pause();

    player.src({
        src: url,
        type: url.includes(".m3u8") ? "application/x-mpegURL" : "video/mp4"
    });

    // 🔥 AUTOPLAY
    player.ready(function () {
        player.muted(true);
        player.play().catch(() => {});
    });

    let name = url.split("/").pop() || "Stream";
    let icon = getIconByUrl(url);

    let type = (url.match(/\.(m3u8|mp4|mp3|ts)/i) || [""])[0]
        .replace(".", "")
        .toUpperCase();

    $("#nombreCanal").html(`
        ${icon} ${name}<br>
        <small style="color:#aaa;">${type}</small>
    `);

    // 🔥 PLAYLIST UI
    $("#playList")
        .removeClass("favorites-mode")
        .empty()
        .append(`
            <button class="list-item active" data-url="${url}">
                ${icon} ${name}
            </button>
        `);

    updateFavButton();
    marcarCanalActivo();
}

        }

        saveM3U(url);
        renderHistory();

        $("#overlay, #form-container").hide();
    });

    // ================== HISTORIAL ==================
    $("#m3u-history").on("click", ".history-item", function () {

        let url = $(this).data("url");

        let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
        let item = history.find(h => h.url === url);

        if (!item) return;

        if (url.startsWith("local-file-") && item.content) {

            parseLocalM3U(item.content);
            $("#nombreCanal").text(item.name);

        } else if (url.match(/\.(m3u8|mp4|mp3|ts)(\?|$)/i)) {

            playDirectStream(url);

        } else {

        }

        $("#overlay, #form-container").hide();

    $("#default-button").click(function () {

        $("#overlay, #form-container").hide();

    $(".preset").click(function () {
        loadChannels($(this).data("url"));
        $("#overlay, #form-container").hide();
    });

    // HISTORIAL CLICK
    $("#m3u-history").on("click", ".history-item", function () {
        let url = $(this).data("url");
        let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
        let item = history.find(h => h.url === url);
        if (!item) return;

        // 🔥 CLAVE: detectar local
        if (item.url.startsWith("local-file-") && item.content) {
            parseLocalM3U(item.content);
            $("#nombreCanal").text(item.name);
        } else {
            $("#m3u-url").val(item.url);
            loadChannels(item.url);
        }
        $("#overlay").hide();
        $("#form-container").hide();
    });

    // BORRAR HISTORIAL
    $("#clear-history").click(function () {
        if (confirm("¿Borrar historial?")) {
            localStorage.removeItem("m3uHistory");
            renderHistory();
        }
    });

    // FAVORITOS
    $("#favorites-button").click(function () {
        window.showingFavorites = true;
        renderFavorites();
        $("#overlay, #form-container").hide();
    });

    $("#fav-btn").click(toggleFavoriteCurrent);

    // CLICK CANAL
    $("#playList").on("click", ".list-item", function() {
        let url = $(this).data("url");
        let nombre = $(this).text();
        currentLink = url; // 🔥 MUY IMPORTANTE
        currentIndex = channelsGlobal.findIndex(c => c.url === url);
        playHLS(url);
        $("#nombreCanal").text(nombre);
        updateFavButton();
        marcarCanalActivo(); // 🔥 ESTA ES LA LÍNEA CLAVE
    });

    // AUTO NEXT BTN
    $("#auto-next-btn").click(function () {
        autoNextEnabled = !autoNextEnabled;
        $(this).text(autoNextEnabled ? "Auto ▶ ON" : "Auto ▶ OFF");
    });

    //ELIMINAR DEL HOSTORIAL
    $("#m3u-history").on("click", ".delete-history", function (e) {
        e.stopPropagation(); // 🔥 evita que cargue la lista
        if (!confirm("¿Eliminar del historial?")) return;
        let url = $(this).data("url");
        let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
        history = history.filter(h => h.url !== url);
        localStorage.setItem("m3uHistory", JSON.stringify(history));
        renderHistory();
    });

});

// ================== TÍTULO DINÁMICO ==================
function actualizarTitulo() {
    let el = document.getElementById("nombreCanal");
    let nombre = el?.textContent?.trim();
    document.title = nombre ? `EASY TV - ${nombre}` : "EASY TV";
}

document.addEventListener("DOMContentLoaded", () => {
    actualizarTitulo();
    const el = document.getElementById("nombreCanal");
    if (el) {
        const observer = new MutationObserver(actualizarTitulo);
        observer.observe(el, {
            childList: true,
            subtree: true
        });
    }
});

// ================== EXPO M3U ==================
function exportCurrentList() {
    let data = [];
    // 🔥 detectar fuente
    if (window.showingFavorites) {
        data = JSON.parse(localStorage.getItem("favorites")) || [];
    } else {
        data = channelsGlobal || [];
    }
    if (!data.length) {
        alert("No hay canales para exportar");
        return;
    }
    // 🔥 nombre archivo
    let today = new Date();
    let dd = String(today.getDate()).padStart(2, '0');
    let mm = String(today.getMonth() + 1).padStart(2, '0');
    let yy = String(today.getFullYear()).slice(-2);
    let fileName = "lista.m3u";
    if (window.showingFavorites) {
        fileName = `favoritos EASY TV - ${yy}.${mm}.${dd}.m3u`;
    }
    // 🔥 construir M3U limpio
    let m3u = "#EXTM3U\n";
    data.forEach(ch => {
        let name = (ch.name || "Sin nombre").trim(); // 🔥 FIX CLAVE
        let group = ch.group || (window.showingFavorites ? "Fav EasyTV" : "General");
        m3u += `#EXTINF:-1 group-title="${group}",${name}\n${ch.url}\n`;
    });
    // 🔥 descargar
    let blob = new Blob([m3u], { type: "text/plain" });
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
}
    
</script>

<script>
// ================== FILE LOCAL ==================
$(document).ready(function () {
    // 📂 botón abrir selector
    $("#file-button").click(function (e) {
        e.preventDefault();
        e.stopPropagation();
        $("#file-input").click();
    });

    // 📂 leer archivo seleccionado
    $("#file-input").on("change", function (e) {
        let file = e.target.files[0];
        if (!file) return;

        let reader = new FileReader();
        reader.onload = function (event) {

            let content = event.target.result;
            // 🔥 detectar playlist válida
            if (content.includes("#EXTM3U") || content.includes("#EXTINF")) {
                window.showingFavorites = false;
                parseLocalM3U(content);
                $("#nombreCanal").text(file.name);
                $("#m3u-url").val("📄 " + file.name);
            } else {
                // 🔥 fallback → stream directo
                let url = content.trim();
                currentLink = url;
                playHLS(url);
                $("#nombreCanal").text(file.name);
                updateFavButton();
            }
            // 🔥 guardar en historial (solo referencia)
            saveLocalFile(file.name, content);
            renderHistory();
            // 🔥 cerrar modal
            $("#overlay").hide();
            $("#form-container").hide();
            // 🔥 reset input (CLAVE para que vuelva a funcionar)
            $("#file-input").val("");
        };
        reader.readAsText(file);
    });

});

// ================== PARSER LOCAL ==================
function parseLocalM3U(message) {
    let lines = message.split("\n");
    let channels = [];
    let currentChannel = { name: "", url: "", group: "General" };

    lines.forEach(line => {
        line = line.trim();
        if (line.startsWith("#EXTINF")) {
            let data = getChannelData(line);
            currentChannel.name = data.name.substring(0, 30);
            currentChannel.group = data.group;
        } else if (line !== "" && !line.startsWith("#")) {
            currentChannel.url = line;
            if (currentChannel.name && currentChannel.url) {
                channels.push({
                    name: currentChannel.name,
                    url: currentChannel.url,
                    group: currentChannel.group
                });
            }
            currentChannel = { name: "", url: "", group: "General" };
        }
    });
    channelsGlobal = channels;

    $("#playList")
        .removeClass("favorites-mode")
        .empty();
    if (!channels.length) {
        $("#playList").html("⚠️ Archivo sin canales");
        return;
    }

    // 🔥 AGRUPAR IGUAL QUE loadChannels
    let grouped = {};

    channels.forEach(ch => {
        if (!grouped[ch.group]) grouped[ch.group] = [];
        grouped[ch.group].push(ch);
    });

    for (let group in grouped) {

        $("#playList").append(`
            <div class="group-title">${group}</div>
        `);

        grouped[group].forEach(channel => {
            $("#playList").append(`
                <button class='list-item' data-url='${channel.url}'>
                    ${channel.name}
                </button>
            `);
        });
    }

    // 🔥 reset scroll
    $("#playList").scrollTop(0);
}

// ================== SAVE LOCAL ==================
function saveLocalFile(fileName, content) {
    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
    let item = {
        name: fileName,
        url: "local-file-" + fileName,
        local: true,
        content: content // 🔥 CLAVE
    };
    history = history.filter(h => h.url !== item.url);
    history.unshift(item);
    history = history.slice(0, 10);
    localStorage.setItem("m3uHistory", JSON.stringify(history));
}

</script>
 
    
<script>
function esDesktop() {
    return !/Android|iPhone|iPad|iPod|SmartTV|TV|WebOS|Tizen/i.test(navigator.userAgent);
}

let deferredPrompt;

// 🔥 evento PWA
window.addEventListener('beforeinstallprompt', (e) => {
    if (!esDesktop()) return;
    e.preventDefault();
    deferredPrompt = e;
    $("#install-banner").fadeIn();
});

// 🔥 cuando el DOM ya existe
$(document).ready(function () {
    $("#install-banner").click(async function () {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log("Resultado instalación:", outcome);
        deferredPrompt = null;
        $("#install-banner").fadeOut();
    });

});

if (window.matchMedia('(display-mode: standalone)').matches) {
$("#install-banner").hide();
}
</script>
