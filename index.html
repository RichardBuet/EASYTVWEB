/* Scroll */

#playList {

/* BOTONES */
button.list-item {

    color: #fff;

/* MODAL */
#overlay {

    background: rgba(0,0,0,0.8);
    display: none;
}

#form-container {
    position: fixed;

    left: 50%;

    max-width: 500px;
    background: var(--panel-bg);

/* RESPONSIVE */

    }

    #playList {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 8px;
    }
}

<script>
// ================== VARIABLES ==================
let autoNextEnabled = false;
let channelsGlobal = [];
let currentIndex = 0;

// let currentLink = "";
let currentLink = null;
const defaultM3U = "https://richardbuet.github.io/EASYTVWEB/AIO2506V0.m3u";


// 🔍 BUSCADOR COMPLETO
$("#search")
.on("focus", function() {
    this.select();
})
.on("input", function() {

    let value = $(this).val().toLowerCase();

    $("#no-results").remove();

    // 🔍 Filtrar botones
    $("#playList button").each(function() {
        let match = $(this).text().toLowerCase().includes(value);
        $(this).css("display", match ? "" : "none");
    });

    // 🔥 Ocultar grupos
    $("#playList .group-title").each(function() {

        let group = $(this);

        let hasVisible = group
            .nextUntil(".group-title")
            .filter("button:visible")
            .length > 0;

        group.css("display", hasVisible ? "" : "none");
    });

    // ⚠️ sin resultados
    if ($("#playList button:visible").length === 0) {

        $(".group-title").hide();

        $("#playList").append(`
            <div id="no-results" style="text-align:center; padding:10px;">
                ❌ Sin resultados
            </div>
        `);
    }

    // 🔄 reset
    if (value === "") {
        $("#playList button").show();
        $("#playList .group-title").show();
        $("#no-results").remove();
    }

});


// 🎬 PLAYER
function playHLS(url) {

    var player = videojs('my-video');

    // 🔥 limpiar eventos duplicados
    player.off('playing');
    player.off('waiting');

    // 🔥 pausar video actual
    player.pause();

    // 🔥 cambiar fuente directamente (SIN limpiar de más)
    player.src({
        src: url,
        type: 'application/x-mpegURL'
    });

    // 🔥 forzar play
    player.play();

    currentLink = url;

    player.on('playing', function () {
        $("#link-info-container").fadeOut();
    });

    player.on('waiting', function () {
        if (autoNextEnabled) {
            $("#link-info-container")
                .html("🔄 Buscando señal...")
                .show();
        }
    });

// SIEMPRE APARECE "BUSCANDO CANAL EN ON Y OFF"

let showingLoading = false;

player.on('waiting', function () {

    if (!showingLoading) {

        showingLoading = true;

        $("#link-info-container")
            .html("🔄 Buscando señal...")
            .show();
    }
});

player.on('playing', function () {
    showingLoading = false;
    $("#link-info-container").fadeOut();
});

player.on('error', function () {
    showingLoading = false;
});

}




// 🧠 PARSER
function getChannelData(line) {
    const nameMatch = line.match(/,(.*)/);
    const groupMatch = line.match(/group-title="([^"]*)"/);

    let name = nameMatch ? nameMatch[1].trim() : "Unknown";
    let group = groupMatch ? groupMatch[1].trim() : "Canales Generales";

    if (!group ||
        group.toLowerCase() === "undefined" ||
        group.toLowerCase() === "n/a" ||
        group.toLowerCase() === "none"
    ) {
        group = "Canales de TV";
    }

    return { name, group };
}


// 📡 CARGA DE LISTA
function loadChannels(url) {

    $("#playList").html(`
        <div style="text-align:center; padding:20px;">
            ⏳ Cargando lista...
        </div>
    `);

    $.ajax({
        type: "GET",
        url: url,
        timeout: 20000,

        success: function (message) {

            let lines = message.split("\n");
            let channels = [];
            let currentChannel = { name: "", url: "", group: "General" };

            lines.forEach(line => {
                line = line.trim();

                if (line.startsWith("#EXTINF")) {
                    let data = getChannelData(line);
                    // ... dentro del forEach ajuste de longitud
                    currentChannel.name = data.name.substring(0, 30); ;
                    currentChannel.group = data.group;

                } else if (line !== "" && !line.startsWith("#")) {

                    currentChannel.url = line;

                    if (currentChannel.name && currentChannel.url) {
                        let groups = currentChannel.group.split(";");

                        groups.forEach(g => {
                            channels.push({
                                name: currentChannel.name,
                                url: currentChannel.url,
                                group: g.trim() || "General"
                            });
                        });
                    }

                    currentChannel = { name: "", url: "", group: "General" };
                }
            });

            // 🔥 eliminar duplicados (FIX)
            let seen = new Set();
            channels = channels.filter(ch => {
                let key = ch.name + ch.group;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            // 🔥 GUARDAR LISTA GLOBAL (CLAVE)
            channelsGlobal = channels;

            if (channels.length === 0) {
                $("#playList").html(`⚠️ Lista sin canales`);
                return;
            }

            // 🔥 AGRUPAR
            let grouped = {};

            channels.forEach(ch => {
                if (!grouped[ch.group]) grouped[ch.group] = [];
                grouped[ch.group].push(ch);
            });

            // 🎛️ RENDER
            $("#playList").empty();

            for (let group in grouped) {

                $("#playList").append(`
                    <div class="group-title" style="color:#00ffcc; font-weight:bold; margin-top:0px;">
                        ${group}
                    </div>
                `);

                grouped[group].forEach(channel => {
                    $("#playList").append(`
                        <button class='list-item' data-url='${channel.url}'>
                            ${channel.name}
                        </button>
                    `);
                });
            }
        },

        error: function (xhr, status, error) {

            let mensaje = "❌ Error al cargar la lista";

            if (status === "timeout") mensaje = "⏱️ La carga tardó demasiado";
            if (xhr.status === 404) mensaje = "❌ Lista no encontrada";

            $("#playList").html(`
                <div style="text-align:center; padding:20px;">
                    ${mensaje}<br>
                    <button onclick="cargarDefault()">🔄 Lista original</button>
                </div>
            `);
        }
    });
};


// 🔁 VOLVER A LISTA ORIGINAL
function cargarDefault() {
    $("#m3u-url").val(defaultM3U);
    loadChannels(defaultM3U);
};


// 🎛️ EVENTOS

    // 📥 CARGAR URL
    $("#ok-button").click(function () {

        } else {
            alert("Ingresá una URL válida");
        }
    });

    // 🔄 DEFAULT
    $("#default-button").click(function () {
        cargarDefault();
        $("#overlay").hide();
        $("#form-container").hide();
    });

    // 🧹 LIMPIAR
    $("#clear-button").click(function () {

    });

    // ❌ CERRAR
    $("#exit-button").click(function () {
        $("#overlay").hide();
        $("#form-container").hide();
    });

    // ⭐ LISTAS RÁPIDAS
    $(".preset").click(function () {
        let url = $(this).data("url");

        $("#m3u-url").val(url);
        loadChannels(url);

        $("#overlay").hide();
        $("#form-container").hide();
    });




    // 🔗 VER LINK
//     $("#nombreCanal").click(function() {

//     if (!currentLink) return; // 🔥 clave

//     $("#link-info-container")
//         .text(currentLink)
//         .show();

//     setTimeout(() => $("#link-info-container").hide(), 5000);
// });

    // 🔗 VER LINK OPCION GEMINIS
    let clickTimer;

    $("#nombreCanal").on("click", function() {
        if (!currentLink) return;

        // Cancelamos cualquier click previo para esperar el segundo (doble clic)
        clearTimeout(clickTimer);

        clickTimer = setTimeout(() => {
            // --- LÓGICA DE 1 CLIC: MOSTRAR EN PANTALLA ---
            $("#link-info-container")
               // .text("Link: " + currentLink)
                .html("<b>Link:</b><br><span>" + currentLink + "</span>")
                .stop(true, true).fadeIn(200);

            setTimeout(() => $("#link-info-container").fadeOut(500), 5000);
            
        }, 250); // 250ms es el tiempo estándar de espera para detectar un doble clic
    });

    $("#nombreCanal").on("dblclick", function() {
        if (!currentLink) return;

        // Cancelamos el temporizador del click simple para que no se ejecute
        clearTimeout(clickTimer);

        // --- LÓGICA DE 2 CLICS: COPIAR AL PORTAPAPELES ---
        navigator.clipboard.writeText(currentLink).then(() => {
            $("#link-info-container")
                .text("✅ ¡Copiado al portapapeles!")
                .stop(true, true).show().fadeOut(3000);
        });
    });




    // 🎬 PLAYER
// 🎬 PLAYER
var player = videojs('my-video');

    player.on('error', function() {

    console.log("Error de señal");

    player.pause();

    // 🖼 mostrar poster
    player.poster("https://img.freepik.com/free-photo/modern-home-interior-with-comfortable-sofa-window-generative-ai_188544-19459.jpg");

    if (autoNextEnabled) {

        let attempts = 0;

        function tryNext() {

            currentIndex++;

            if (currentIndex >= channelsGlobal.length || attempts > 10) {
                console.log("No se encontró canal válido");
                return;
            }

            let next = channelsGlobal[currentIndex];

            console.log("Probando:", next.name);

            $("#link-info-container")
            .html(`🔄 Probando: <br><b>${next.name}</b>`)
            .show();

            playHLS(next.url);
            $("#nombreCanal").text(next.name);

            $(".list-item").removeClass("active");

            let btn = $("#playList button").eq(currentIndex);
            btn.addClass("active");

            attempts++;
        }

        setTimeout(tryNext, 1500);

    } else {

        $("#link-info-container")
        .html("❌ Señal fuera de servicio")
        .show();
        // $(".vjs-loading-spinner").fadeOut(100);

    }
});

});

   // Función para actualizar el título
    function actualizarTitulo() {
      const canal = document.getElementById("nombreCanal");
      if (canal) {
        document.title = "EASYTV - " + canal.textContent;
      }
    }

    // Actualiza el título al cargar la página
    actualizarTitulo();

    // Observa cambios en el contenido del elemento
    const canal = document.getElementById("NombreCanal");
    if (canal) {
      const observer = new MutationObserver(actualizarTitulo);
      observer.observe(canal, { childList: true, characterData: true, subtree: true });
    };

function saveM3U(url) {

    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];

    let u = new URL(url);

    let file = u.pathname.split("/").pop() || "lista";
    let shortName = u.hostname + " / " + file;

    let item = {
        name: shortName,
        url: url
    };

    // 🔥 evitar duplicados por URL completa
    history = history.filter(h => h.url !== url);

    // 🔥 agregar al inicio
    history.unshift(item);

    // 🔥 limitar a 5 elementos
    history = history.slice(0, 5);

    // 🔥 guardar
    localStorage.setItem("m3uHistory", JSON.stringify(history));
}



function renderHistory() {

    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];

    $("#m3u-history").empty();

    history.forEach(item => {
        $("#m3u-history").append(`
            <div class="history-item" data-url="${item.url}">
                🔗 ${item.name}
            </div>
        `);
    });
}

$("#m3u-history").on("click", ".history-item", function () {

    let url = $(this).data("url");

    $("#m3u-url").val(url);
    loadChannels(url);

    $("#overlay").hide();
    $("#form-container").hide();
});

$("#clear-history").click(function () {

    if (confirm("¿Borrar historial de listas?")) {

        localStorage.removeItem("m3uHistory");

        renderHistory(); // refresca UI

        $("#m3u-url").val(""); // opcional limpiar input
    }
    if (!localStorage.getItem("m3uHistory")) {
    $("#clear-history").hide();
}
});

      // Actualiza el título usando el contenido visible del canal
function actualizarTituloDesdeDOM() {
  const el = document.getElementById("nombreCanal");
  const nombre = el?.textContent?.trim();

  document.title = nombre ? `EASY TV - ${nombre}` : "EASY TV";
}

// Ejecutar cuando carga la página
document.addEventListener("DOMContentLoaded", () => {
  actualizarTituloDesdeDOM();

  const el = document.getElementById("nombreCanal");

  if (el) {
    const observer = new MutationObserver(() => {
      actualizarTituloDesdeDOM();
    });

    observer.observe(el, {
      childList: true,
      characterData: true,
      subtree: true
    });
  }
});
