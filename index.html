<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Easy Web TV RB - BTN v3.6</title>
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="https://cdn.icon-icons.com/icons2/1582/PNG/128/youtube_108041.png">
    <meta name="description" content="Prueba de lista M3U">

    <link href="https://vjs.zencdn.net/7.11.4/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/ie8/1.1.2/videojs-ie8.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://vjs.zencdn.net/7.11.4/video.min.js"></script>

<style>

body, html { 
    background: #111111; 
    overflow-x: hidden;
    overflow-y: clip;
    font-family: sans-serif;
    color: #fff; 
    height: -webkit-fill-available; 
    min-width: 290px;}

h2 {margin: 0;} 

*::-webkit-scrollbar {
    width: 10px;

    margin: 0 4px;
    background: #5f9ea01c;
    border-radius: 15px;
}
*::-webkit-scrollbar-thumb {
    background-color: #74089342;
    border-radius: 15px;
    border: 2px solid #8e06d49e;
    height: 10%;
}
*:focus-visible {
    outline: #00FF00;
    outline-style: groove;
}

/* ####  TITULO  #### */
#top-bar { background: #111222; text-align: center; cursor: pointer; padding-bottom: 20px;}

/* ####  MENU  #### */
#rl-bar{display: flex; flex-direction: row; margin-top: 10px; gap: 10px; }

/* ####  PRIMERO  #### */
#player { display: flex; margin: 0 auto; width: max-content; z-index: 2;}
#my-video {border-radius: 4px;}

.video-js{ width: 131vh; height: auto; max-height: 100vh; max-width: calc(100vh* 16 / 9);}
.video-js .vjs-tech {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
/*    height: auto;*/
    max-height: 100vh;
    border-radius: 4px;}
:not(:root):fullscreen { user-select: text; height: 100%;}
.vjs-big-play-button { 
    position: absolute;
    top: 34%!important;
    left: calc(100% / 2 - 0.65em) !important;
    margin: -25px 0px 0px -25px;
    opacity: 0.85!important;}
.vjs-error .vjs-error-display:before {top: 34%!important;}
.vjs-loading-spinner { top: 34%!important;}
.vjs-error .vjs-loading-spinner { display: none!important;}


.vjs-poster, .video-js .vjs-progress-control { display: none;}
.video-js .vjs-volume-panel .vjs-volume-control.vjs-volume-horizontal { display: none !important;}

.vjs-error .vjs-error-display .vjs-modal-dialog-content {  font-size: 1.7em !important;}
.vjs-error .vjs-error-display:before { content: url(https://cdn-icons-png.flaticon.com/64/5940/5940284.png) / "OUT"; top: 31% !important; }
.video-js .vjs-big-play-button { font-size: 0!important;}
.video-js .vjs-big-play-button .vjs-icon-placeholder:before {
    content: url(https://cdn.icon-icons.com/icons2/1582/PNG/128/youtube_108041.png) / " EASYTV: ";
    SCALE: 80%;
    /* top: 22% !important; */
    /* left: calc(100% / 3 - 0.35em) !important; */
    margin: -25px 0px 0px -25px;
    opacity: 0.85 !important;}

/* ####  SEGUNDO  #### */
#lists { 
    display: flex;
    flex-direction: column;
    scroll-snap-type: y mandatory;
    overflow: auto;
    overflow-x: hidden;
    height: 74vh;
    width: -webkit-fill-available;
    z-index: 2;
    list-style: none;}
.list-item { 
    cursor: pointer; 
    color: #fff; 
    text-overflow: ellipsis;
    text-transform: uppercase; /* Convertir todo el texto a minúsculas lowercase */
    white-space: nowrap;
    overflow: hidden;}
.list-item:hover { color: crimson; /*font-size: medium;*/ font-weight: bolder;}
.list-item:first-letter {  text-transform: uppercase; /* Convertir la primera letra a mayúscula uppercase */ }

#playList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    /*gap: 0.45rem; 1y2opciones 0.6rem;*/
    gap: calc(100vh / 50);
    padding-top: 2px;
    height: auto!important;
    }

button.list-item{
    padding: 8px 0; 
   /* height: calc(100vh / 24);*/
    margin: auto 3px;
    text-align: center;
    text-overflow: ellipsis;
    text-transform: uppercase;
    white-space: nowrap;
    font-size: 0.65em;
    border: 1px solid rgb(72 97 135);
    border-radius: 8px;
    overflow: hidden;
    /*background: linear-gradient(to bottom, #265a8aa3, #08153f00);*/
    background: linear-gradient(90deg, #14395b 10%, #20496e 50%, #14395b 90%);
    color: #dae6ec;
    cursor: pointer;
    transition: background 1.3s, color 1.3s;
    border-style: inset;
}





/* #### Estilos para el formulario flotante #### */
#overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    z-index: 999;
}

#m3u-url {
    width: 80vw;
    /* min-width: 200px;*/
    border-color: rgba(0, 0, 0, 0.5);
    border-radius: 3px;
    background: #f0fff0;
}

#form-container {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #fff;
    padding: 20px;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    z-index: 1000;
}

#form-btn {
    margin-top: 15px;
    display: flex;
    gap: 20px;
    width: 100%;
    justify-content: space-between;
}

#form-container button { width: inherit; }



#nombreCanal {
    animation: none;    
    font-size: 0.8rem; /*medium;*/
    text-transform: uppercase;
    opacity: 1;
    color: rgb(8 254 0 / 80%);
    display: flex;
    justify-content: space-around;    
    position: absolute;
    width: calc(100vw - 16px);
    top: 36px;
    cursor: pointer;
} 




/*  PARA PANTALLA VERTICAL  */


@media (max-aspect-ratio: 1.40) {
    #rl-bar { flex-direction: column;}
    .video-js { width: calc(100vw - 16px); height: calc((100vw * 9 / 16) - 8px);}
    #lists { height: calc(100vh - (100vw * 9 / 16) - 80px);  margin-top: 3px; }
    #playList { padding-top: 2px; gap: 0.6rem; }
    button.list-item {  padding: 8px 0; font-size: 0.6em; }
}


@keyframes fadeInOut {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeOutIn {
  from { opacity: 1; }
  to { opacity: 0; }
}

#link-info-container {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    max-width: 70vw;
    min-width: 50vw;
    
    background-color: rgba(255, 255, 255, 0.9);
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    z-index: 1000;
    color: black;

    word-break: break-all;       /* 🔥 corta URLs largas */
    overflow-wrap: break-word;   /* 🔥 fallback */
    white-space: normal;         /* 🔥 permite salto de línea */
}

#preset-lists button {
    font-size: 0.7em;
    padding: 6px;
    border-radius: 6px;
    background: #1f3f5b;
    color: #fff;
    border: 1px solid #3a6b9a;
}

#form-container button {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #3a6b9a;
    background: linear-gradient(90deg, #14395b 10%, #20496e 50%, #14395b 90%);
    color: #dae6ec;
    font-size: 0.75em;
    cursor: pointer;
    transition: all 0.3s ease;
}

#form-container button:hover {
    background: #2a5f8f;
    color: #fff;
}

#form-container button:active {
    transform: scale(0.95);
}

#ok-button { 
    border-color: #2ecc71;     
    font-weight: bold;
    box-shadow: 0 0 8px rgba(46, 204, 113, 0.4);}      /* verde */
#clear-button { border-color: #f39c12; }   /* naranja */
#exit-button { border-color: #e74c3c; }    /* rojo */
#default-button { border-color: #3498db; } /* azul */


</style>

</head>

<body>
    <div id="top-bar">
    <h2>EASY TV WEB - LINK M3U</h2>
    </div>

 <!-- Formulario flotante 
    url: 'https://raw.githubusercontent.com/RichardBuet/EASYTVWEB/main/listRB.m3u',
    https://live-01-01-tn.vodgc.net/TN24/index.m3u8
    https://live-01-01-tn.vodgc.net/TN24/index_TN24_480.m3u8

 -->
    <div id="overlay"></div>
<div id="form-container">

    <input type="text" id="m3u-url" placeholder="Introducir dirección M3U">

    <div id="form-btn">
        <button id="ok-button">Cargar</button>
        <button id="clear-button">Limpiar</button>
        <button id="exit-button">Cerrar</button>
        <button id="default-button">Default</button>
    </div>

    <!-- 🔥 NUEVO BLOQUE (ACÁ VA) -->
    <div id="preset-lists" style="margin-top:10px; display:flex; flex-wrap:wrap; gap:6px; justify-content:center;">
        <button class="preset" data-url="https://iptv-org.github.io/iptv/index.m3u">🌍 Global</button>
        <button class="preset" data-url="https://iptv-org.github.io/iptv/countries/ar.m3u">🇦🇷 Argentina</button>
        <button class="preset" data-url="https://iptv-org.github.io/iptv/categories/news.m3u">📰 Noticias</button>
        <!-- <button class="preset" data-url="https://iptv-org.github.io/iptv/streams/es_pluto.m3u">📺 Pluto</button> -->
        <button class="preset" data-url="https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/es_pluto.m3u">📺 Pluto</button>
        <button class="preset" data-url="https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/es_rakuten.m3u">📺 Rakuten</button>
        <button class="preset" data-url="https://raw.githubusercontent.com/junguler/m3u-radio-music-playlists/refs/heads/main/top_40.m3u">📡 Radio 40 TV</button>
        <!-- <button class="preset" data-url="https://i.mjh.nz/Plex/all.m3u8">🎬 Plex TV</button> -->
        <button class="preset" data-url="https://iptv-org.github.io/iptv/index.category.m3u">📂 Categorías</button>
    </div>

</div>

<div id="nombreCanal">Bienvenido Easy Web TV || Probá M3U y ver URL de Link</div>

<!-- Contenedor flotante para mostrar el enlace -->
<div id="link-info-container" > Enlace actual:
</div>

<!-- style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(255, 255, 255, 0.5); padding: 10px; border: 1px solid #ccc; border-radius: 5px; z-index: 1000;
    color: black;" -->

<div id="rl-bar">

    <div id="player">
        <video id="my-video" playsinline webkit-playsinline muted class="video-js" autoplay controls preload="metadata" controlsList="noplaybackrate" width="900" poster="https://img.freepik.com/free-photo/modern-home-interior-with-comfortable-sofa-window-generative-ai_188544-19459.jpg" data-setup='{}'>
        <source src="https://live-01-01-tn.vodgc.net/TN24/index_TN24_720.m3u8" type="application/x-mpegURL">
        </video>
    </div>
    <!-- Elemento de formación de Lista -->
    <div id="lists"> 
        <!-- Buscador -->
        <input type="text" id="search" placeholder="Buscador de canal..." style="margin: 3px;margin-bottom: 0.6rem;padding:6px;border-radius: 8px;background: #111111;">
        <!-- Canales -->
        <div id="playList"></div> </div>

</div>

<script>

let currentLink = "";
const defaultM3U = "https://richardbuet.github.io/EASYTVWEB/AIO2506V0.m3u";

// 🔍 Buscador
$("#search").on("input", function() {
    let value = $(this).val().toLowerCase();
    $("#playList button").filter(function() {
        $(this).toggle($(this).text().toLowerCase().includes(value));
    });
});

// 🎬 Reproducir video
function playHLS(url) {
    var player = videojs('my-video');
    player.src({
        src: url,
        type: 'application/x-mpegURL'
    });
    player.play();
    currentLink = url;
}

// 🧠 Obtener nombre del canal
function getChannelName(line) {
    const match = line.match(/,(.*)/);
    return match && match[1] ? match[1].trim() : "Unknown";
}

// 📡 Cargar lista M3U (VERSIÓN FINAL ROBUSTA)
function loadChannels(url) {

    $("#playList").html(`
        <div style="text-align:center; padding:20px;">
            ⏳ Cargando lista...
        </div>
    `);

    $.ajax({
        type: "GET",
        url: url,
        timeout: 10000,

        success: function (message) {

            let lines = message.split("\n");
            let channels = [];
            let currentChannel = { name: "", url: "" };

            lines.forEach(line => {
                line = line.trim();

                if (line.startsWith("#EXTINF")) {
                    currentChannel.name = getChannelName(line);

                } else if (line !== "" && !line.startsWith("#")) {
                    currentChannel.url = line;

                    if (currentChannel.name && currentChannel.url) {
                        channels.push({
                            name: currentChannel.name,
                            url: currentChannel.url
                        });
                    }

                    currentChannel = { name: "", url: "" };
                }
            });

            if (channels.length === 0) {
                $("#playList").html(`
                    <div style="text-align:center; padding:20px;">
                        ⚠️ La lista no contiene canales válidos
                    </div>
                `);
                return;
            }

            $("#playList").empty();

            channels.forEach(channel => {
                $("#playList").append(`
                    <button class='list-item' data-url='${channel.url}'>
                        ${channel.name}
                    </button>
                `);
            });
        },

        error: function (xhr, status, error) {

            let mensaje = "❌ Error al cargar la lista";

            if (status === "timeout") {
                mensaje = "⏱️ La carga tardó demasiado";
            } else if (xhr.status === 404) {
                mensaje = "❌ Lista no encontrada (404)";
            }

            $("#playList").html(`
                <div style="text-align:center; padding:20px;">
                    ${mensaje}<br>
                    <small>${xhr.status || ""} ${error || ""}</small><br><br>
                    <button onclick="cargarDefault()">🔄 Lista original</button>
                </div>
            `);
        }
    });
}

// 🔁 Volver a lista original
function cargarDefault() {
    $("#m3u-url").val(defaultM3U);
    loadChannels(defaultM3U);
}

// 🎛️ EVENTOS PRINCIPALES
$(document).ready(function () {

    // Carga inicial
    loadChannels(defaultM3U);

    // Click canal
    $("#playList").on('click', 'button', function() {
        let url = $(this).data('url');
        let nombre = $(this).text();

        playHLS(url);
        $("#nombreCanal").text(nombre);
    });

    // Mostrar modal
    $("#top-bar h2").click(function () {
        $("#overlay").show();
        $("#form-container").show();
    });

    // Cargar URL manual
    $("#ok-button").click(function () {
        var url = $("#m3u-url").val();

        if (url !== "") {
            loadChannels(url);
            $("#overlay").hide();
            $("#form-container").hide();
        } else {
            alert("Ingresá una URL válida");
        }
    });

    // Lista original
    $("#default-button").click(function () {
        cargarDefault();
        $("#overlay").hide();
        $("#form-container").hide();
    });

    // Limpiar input
    $("#clear-button").click(function () {
        $("#m3u-url").val("");
    });

    // Cerrar modal
    $("#exit-button").click(function () {
        $("#overlay").hide();
        $("#form-container").hide();
    });

    // Listas rápidas
    $(".preset").click(function () {
        const url = $(this).data("url");

        $("#m3u-url").val(url);
        loadChannels(url);

        $("#overlay").hide();
        $("#form-container").hide();
    });

    // Mostrar link actual
    $("#nombreCanal").click(function() {
        $("#link-info-container").text(currentLink).show();
        setTimeout(() => $("#link-info-container").hide(), 7000);
    });

    // Error del player
    var player = videojs('my-video');

    player.on('error', function() {
        player.errorDisplay.fillWith('Señal fuera de servicio, cambiando canal...');
        player.errorDisplay.show();
    });

});

</script>

</body>

</html>
