/* =========================
   SPLASH SCREEN EASYTVWEB
========================= */

#splash-screen {
    position: fixed;
    inset: 0;
    z-index: 99999;

    display: flex;
    align-items: center;
    justify-content: center;

    background:
        radial-gradient(circle at center,
        #07111f 0%,
        #000814 45%,
        #000000 100%);

    opacity: 1;
    transition: opacity 0.5s ease;

    overflow: hidden;

    /* Suaviza iOS */
    will-change: opacity;
    transform: translateZ(0);
}

/* Imagen de fondo */
/* =========================
   SPLASH LOGO
========================= */

#splash-screen img {
    backdrop-filter: blur(8px);
    width: 320px;
    max-width: 70vw;
    height: auto;
    border-radius: 50%;
    object-fit: cover;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    animation: pulse 2.2s infinite ease-in-out;
    box-shadow:
        0 0 25px rgba(0, 180, 255, 0.25),
        0 0 60px rgba(0, 100, 255, 0.12);
}

/* Animación suave */
@keyframes pulse {

    0% {
        transform: scale(0.8);
        opacity: 0.75;
    }

    50% {
        transform: scale(1.0);
        opacity: 1;
    }

    100% {
        transform: scale(0.8);
        opacity: 0.7;
    }

}

    
/* Overlay oscuro para mejor estética */
#splash-screen::after {
    content: "";
    position: absolute;
    inset: 0;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,0.15),
            rgba(0,0,0,0.45)
        );
}

/* Logo opcional */
#splash-logo {
    position: absolute;
    z-index: 2;

    width: 140px;
    max-width: 40vw;

    opacity: 0.95;

    filter:
        drop-shadow(0 0 10px rgba(0,0,0,0.5));
}

/* Loader opcional */
.loader {
    position: absolute;
    bottom: 60px; /* 50px;*/
    z-index: 2;

    width: 42px;
    height: 42px;

    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #00ffd0;
    border-radius: 50%;

    animation: spin 1s linear infinite;
}

/* Fade out */
#splash-screen.hide {
    opacity: 0;
    pointer-events: none;
}

/* Animación loader */
@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* 1. Base y Reset */
body, html {
    background: var(--bg-dark);
    margin: 0; padding: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden; /* Evita el scroll global molesto */
}

.container {
  height: calc(var(--vh) * 100);
}
    
/* 2. Barra Superior */
#top-bar {
    height: 50px;
    background: #010409;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
}
#top-bar h2 {    
    letter-spacing: 1px;
    color: var(--accent);
    margin: 10px;
    position: relative;
    font-size: larger;
    width: auto;
    text-shadow: 0 0 5px var(--bg-dark), 0 0 7px #fff, 0 0 15px #0fa;
    white-space: nowrap;
}

/* 3. Overlays del Video (Nombre e Info) */
#nombreCanal {
    top: 10px;
    left: 10px;
    z-index: 5;
    background: rgba(0, 0, 0, 0.7);
    padding: 6px 12px;
    margin-left: 10px;
    border-radius: 4px;
    color: var(--accent);
    font-size: 0.9rem;
    color: #00ffee;
    border-left: 3px solid var(--accent);
    cursor: pointer;
    user-select: none; /* Evita que se seleccione el texto azul al hacer doble clic */
    display: block;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 43px;
}

/* 4. Layout Principal (Flexbox) */
#rl-bar {
    display: flex;
    height: calc(100vh - 80.9px);
    flex-direction: row;
    justify-content: center;/* Por defecto para PC/TV */
    justify-content: space-around;
}

/* 5. Contenedor del Reproductor */
#player {
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    width: calc((100vh - 81px) * 16 / 9);
    aspect-ratio: 16 / 9;
    max-width: 80vw;
    transition: transform 0.2s ease;
}

let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

function saveFavorites() {
    localStorage.setItem("favorites", JSON.stringify(favorites));
}

function toggleFavoriteCurrent() {
    if (!currentLink) return;
    let name = $("#nombreCanal").text();
    let index = favorites.findIndex(f => f.url === currentLink);
    if (index !== -1) {
        favorites.splice(index, 1);
    } else {
        favorites.push({ name, url: currentLink });
    }
    saveFavorites();
    updateFavButton();
    // 🔥 REFRESCAR SI ESTÁS EN FAVORITOS
    if (window.showingFavorites) {
        renderFavorites();
    }
}

function updateFavButton() {
    let exists = favorites.some(f => f.url === currentLink);
    $("#fav-btn").text(exists ? "✔" : "⭐");
}

function marcarCanalActivo() {
    if (!currentLink) return;
    // 🔥 LIMPIEZA GLOBAL REAL
    document.querySelectorAll(".list-item.active")
        .forEach(el => el.classList.remove("active"));
    let btn = document.querySelector(`.list-item[data-url="${currentLink}"]`);
    if (btn) {
        btn.classList.add("active");
    }
}

// ================== PLAYER ==================
function playHLS(url) {

    var player = videojs('my-video');

    // 🔥 limpiar eventos anteriores (MUY IMPORTANTE)
    player.off('waiting');
    player.off('playing');
    player.off('loadeddata');
   // player.off('error');
    handlePlayerError();

    player.pause();

    let type = "application/x-mpegURL";

    if (url.endsWith(".mp4")) {
        type = "video/mp4";
    } else if (url.endsWith(".mp3")) {
        type = "audio/mpeg";
    } else if (url.endsWith(".ts")) {
        type = "video/mp2t";
    } else if (url.endsWith(".m3u8")) {
        type = "application/x-mpegURL";
    }

    player.src({ src: url, type: type });
    player.play();

    currentLink = url;

    // ================== POSTER HELPER ==================
    function setPoster(show) {
        let el = document.querySelector(".vjs-poster");
        if (!el) return;

        el.style.setProperty(
            "display",
            show ? "flex" : "none",
            "important"
        );
    }

    // 🔥 mostrar poster al iniciar
    if (!isAutoSearching) {
        setPoster(true);

        $("#link-info-container")
            .html("🔄 Buscando señal...")
            .show();
    }

    // ================== EVENTOS ==================

    // 🔥 iPhone FIX (más confiable que playing)
    player.on('loadeddata', function () {
        setPoster(false);
    });

    // 🔥 cuando empieza a reproducir
    player.on('playing', function () {
        $("#link-info-container").fadeOut();
        setPoster(false);
    });

    // 🔥 buffering
    player.on('waiting', function () {
        if (!isAutoSearching) {
            setPoster(true);

            $("#link-info-container")
                .html("🔄 Cargando...")
                .show();
        }
    });

    // 🔥 error
    player.on('error', function () {
        if (!isAutoSearching) {
            setPoster(true);

            $("#link-info-container")
                .html("🔥 Señal fuera de servicio")
                .show();
        }
    });
}


// ================== PARSER ==================
function getChannelData(line) {
    const nameMatch = line.match(/,(.*)/);
    const groupMatch = line.match(/group-title="([^"]*)"/);
    let name = nameMatch ? nameMatch[1].trim() : "Unknown";
    let group = groupMatch ? groupMatch[1].trim() : "Canales Generales";
    if (!group ||
        group.toLowerCase() === "undefined" ||
        group.toLowerCase() === "n/a" ||
        group.toLowerCase() === "none"
    ) {
        group = "Canales de TV";
    }
    return { name, group };

    //updateChannelCount();
}

// ================== CARGA LISTA ==================
function loadChannels(url) {
    // 🔥 SALIR DE FAVORITOS SI CARGO NUEVA LISTA
    window.showingFavorites = false;
    $("#playList").removeClass("favorites-mode");
    // 🔄 loading con estilo
    $("#playList").html(`
        <div class="loading-list">⏳ Cargando lista...</div>
    `);

    $.ajax({
        type: "GET",
        url: url,
      //  url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
        timeout: 15000,
        success: function (message) {
            let lines = message.split("\n");
            let channels = [];
            let currentChannel = { name: "", url: "", group: "General" };
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith("#EXTINF")) {
                    let data = getChannelData(line);
                    currentChannel.name = data.name.substring(0, 30);
                    currentChannel.group = data.group;
                } else if (line !== "" && !line.startsWith("#")) {
                    currentChannel.url = line;
                    if (currentChannel.name && currentChannel.url) {
                        let groups = currentChannel.group.split(";");
                        groups.forEach(g => {
                            channels.push({
                                name: currentChannel.name,
                                url: currentChannel.url,
                                group: g.trim() || "General"
                            });
                        });
                    }
                    currentChannel = { name: "", url: "", group: "General" };
                }
            });

            // 🔥 eliminar duplicados
            let seen = new Set();
            channels = channels.filter(ch => {
                let key = ch.name + ch.group;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            channelsGlobal = channels;

            if (channels.length === 0) {

                let name = url.split("/").pop() || "Stream";

                // 🔥 limpiar query (opcional pero recomendado)
                name = name.split("?")[0];

                // 🔥 limitar a 30 caracteres
                if (name.length > 30) {
                    name = name.substring(0, 30) + "...";
                }

                let icon = getIconByUrl(url);

                $("#playList").html(`
                    <div class="loading-list">
                        ⚠️ Lista sin canales<br><br>
                        👉 Probando como stream
                    </div>

                    <button class="list-item active" data-url="${url}">
                        ${icon} ${name}
                    </button>
                `);

                // 🔥 reproducir directo
                currentLink = url;
                playHLS(url);
                updateFavButton();

                return;
            }

            // 🔥 agrupar
            let grouped = {};
            channels.forEach(ch => {
                if (!grouped[ch.group]) grouped[ch.group] = [];
                grouped[ch.group].push(ch);
            });

            $("#playList").empty();
            for (let group in grouped) {
                $("#playList").append(`
                    <div class="group-title">${group}</div>
                `);
                grouped[group].forEach(channel => {
                    $("#playList").append(`
                        <button class='list-item' data-url='${channel.url}'>
                            ${channel.name}
                        </button>
                    `);
                });
            }

            // 🔥 restaurar selección
            setTimeout(() => {
                marcarCanalActivo();
            }, 100);
            // 🔥 restaurar ventana
            $("#playList").scrollTop(0);
        },


        error: function (xhr, status, error) {

            let mensaje = "❌ Error al cargar la lista";
        
            // 🔥 CORS (el caso que te está pasando)
            if (xhr.status === 0) {
                mensaje = `
                    🚫 Lista bloqueada por el servidor<br><br>
                    👉 Descargala y cargar como archivo<br>
                     o usá otra fuente<br>
                `;
            }
        
            // ⏱️ timeout
            else if (status === "timeout") {
                mensaje = "⏱️ La carga tardó demasiado";
            }
        
            // ❌ 404
            else if (xhr.status === 404) {
                mensaje = "❌ Lista no encontrada";
            }
        
            $("#playList").html(`
                <div style="text-align:center; padding:20px;">
                    ${mensaje}
                    <br><br>
                    <button onclick="cargarDefault()">🔄 Lista original</button>
                </div>
            `);
        }

    });
}

// ================== HISTORIAL ==================
function saveM3U(url) {
    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
    let shortName;
    try {
        let u = new URL(url);
        let file = u.pathname.split("/").pop() || "lista";
        shortName = u.hostname + " / " + file;
    } catch {
        shortName = url; // fallback si no es URL válida
    }

    history = history.filter(h => h.url !== url);
    history.unshift({
        name: shortName,
        url: url
    });
    history = history.slice(0, 15);
    localStorage.setItem("m3uHistory", JSON.stringify(history));
}

function renderHistory() {
    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
    $("#m3u-history").empty();
    history.forEach(h => {
        let displayName;
        // 🔥 SI ES LOCAL
        if (h.url.startsWith("local-file-")) {

            displayName = h.name;
        } else {
            try {
                let u = new URL(h.url);
                let file = u.pathname.split("/").pop() || "lista";
                displayName = u.hostname + " / " + file;
            } catch {
                displayName = h.url;
            }
        }
        let icon = h.url.startsWith("local-file-") ? "📂" : "🌐";
        $("#m3u-history").append(`
            <div class="history-item" data-url="${h.url}" >
                <span style="flex:1; overflow:hidden; text-overflow:ellipsis;">
                    ${icon} ${displayName}
                </span>
                <span class="delete-history" data-url="${h.url}" style="cursor:pointer; color:red; margin-left:8px;">
                    ❌
                </span>
            </div>
        `);
    });
}

// ================== AUTO NEXT ==================
function getVisibleChannels() {
    let list = [];
    $("#playList .list-item:visible").each(function () {
        list.push({
            name: $(this).text(),
            url: $(this).data("url")
        });
    });
    return list;
}

function handlePlayerError() {
    var player = videojs('my-video');
    player.off('error'); // 🔥 evitar duplicados
    player.on('error', function () {
        player.pause();
        if (!autoNextEnabled) {
            // 🔥 SOLO mostrar error si NO está buscando
            if (!isAutoSearching) {
              //  $(".vjs-poster").css("display", "flex !important;");
                $("#link-info-container")
                    .html("🔥 Señal fuera de servicio")
                    .show();
            }
            return;
        }
        let attempts = 0;
        const MAX_ATTEMPTS = 10;
        isAutoSearching = true; // 🔥 ACTIVAR MODO BÚSQUEDA

        function tryNext() {
            let visibleList = getVisibleChannels();
            let currentPos = visibleList.findIndex(c => c.url === currentLink);
            if (currentPos === -1) return;
            let nextIndex = currentPos + 1;
            if (nextIndex >= visibleList.length || attempts >= MAX_ATTEMPTS) {
                console.log("No se encontró canal válido");
                isAutoSearching = false; // 🔥 DESACTIVAR

                $("#link-info-container")
                    .html("❌ No se encontró señal disponible")
                    .show();
                return;
            }
            let next = visibleList[nextIndex];
            console.log("🔄 Probando:", next.name);
            // 🔥 mensaje visual
            $("#link-info-container")
                .stop(true, true)
                .html(`<div style="display:block;">🔄 Probando:<br><b>${next.name}</b></div>`)
                .show()
            // 🔥 actualizar estado
            currentLink = next.url;
            currentIndex = nextIndex;
            playHLS(next.url);
            $("#nombreCanal").text(next.name);
            marcarCanalActivo();
            attempts++;
            setTimeout(() => {
            isAutoSearching = false;
            $("#link-info-container").fadeOut();
            }, 2500);
        }
        tryNext();
    });

    // 🔥 cuando el video arranca correctamente
    player.on('playing', function () {
        isAutoSearching = false;
            $("#link-info-container")
        .stop(true, true)
        .fadeOut();
    });
}



// ================== UTIL ==================
function getIconByUrl(url) {
    if (url.startsWith("local-file-")) return "📂";
    if (url.includes(".m3u8")) return "📺";
    if (url.includes(".mp4")) return "🎬";
    if (url.includes(".mp3")) return "🎧";
    if (url.includes(".ts")) return "📡";
    return "🌐";
}

// ================== PLAY DIRECT ==================
function playDirectStream(url) {

    currentLink = url;

    let player = videojs('my-video');

    player.pause();

    player.src({
        src: url,
        type: url.includes(".m3u8") ? "application/x-mpegURL" : "video/mp4"
    });

    // 🔥 AUTOPLAY
    player.ready(function () {
        player.muted(true);
        player.play().catch(() => {});
    });

    let name = url.split("/").pop() || "Stream";
    let icon = getIconByUrl(url);

    let type = (url.match(/\.(m3u8|mp4|mp3|ts)/i) || [""])[0]
        .replace(".", "")
        .toUpperCase();

    $("#nombreCanal").html(`
        ${icon} ${name}<br>
        <small style="color:#aaa;">${type}</small>
    `);

    // 🔥 PLAYLIST UI
    $("#playList")
        .removeClass("favorites-mode")
        .empty()
        .append(`
            <button class="list-item active" data-url="${url}">
                ${icon} ${name}
            </button>
        `);

    updateFavButton();
    marcarCanalActivo();
}

    if (Math.abs(distance) < 60) return;

    $("#player").addClass("swipe-blur");
setTimeout(() => {

}, 280);

function actualizarTitulo() {
    let el = document.getElementById("nombreCanal");
    let nombre = el?.textContent?.trim();
    document.title = nombre ? `EASY TV - ${nombre}` : "EASY TV";
}

document.addEventListener("DOMContentLoaded", () => {
    actualizarTitulo();
    const el = document.getElementById("nombreCanal");
    if (el) {
        const observer = new MutationObserver(actualizarTitulo);
        observer.observe(el, {
            childList: true,
            subtree: true
        });
    }
});

// ================== EXPO M3U ==================
function exportCurrentList() {
    let data = [];
    // 🔥 detectar fuente
    if (window.showingFavorites) {
        data = JSON.parse(localStorage.getItem("favorites")) || [];
    } else {
        data = channelsGlobal || [];
    }
    if (!data.length) {
        alert("No hay canales para exportar");
        return;
    }
    // 🔥 nombre archivo
    let today = new Date();
    let dd = String(today.getDate()).padStart(2, '0');
    let mm = String(today.getMonth() + 1).padStart(2, '0');
    let yy = String(today.getFullYear()).slice(-2);
    let fileName = "lista.m3u";
    if (window.showingFavorites) {
        fileName = `favoritos EASY TV - ${yy}.${mm}.${dd}.m3u`;
    }
    // 🔥 construir M3U limpio
    let m3u = "#EXTM3U\n";
    data.forEach(ch => {
        let name = (ch.name || "Sin nombre").trim(); // 🔥 FIX CLAVE
        let group = ch.group || (window.showingFavorites ? "Fav EasyTV" : "General");
        m3u += `#EXTINF:-1 group-title="${group}",${name}\n${ch.url}\n`;
    });
    // 🔥 descargar
    let blob = new Blob([m3u], { type: "text/plain" });
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
}
    
</script>

<script>
// ================== FILE LOCAL ==================
$(document).ready(function () {
    // 📂 botón abrir selector
    $("#file-button").click(function (e) {
        e.preventDefault();
        e.stopPropagation();
        $("#file-input").click();
    });

    // 📂 leer archivo seleccionado
    $("#file-input").on("change", function (e) {
        let file = e.target.files[0];
        if (!file) return;

        let reader = new FileReader();
        reader.onload = function (event) {

            let content = event.target.result;
            // 🔥 detectar playlist válida
            if (content.includes("#EXTM3U") || content.includes("#EXTINF")) {
                window.showingFavorites = false;
                parseLocalM3U(content);
                $("#nombreCanal").text(file.name);
                $("#m3u-url").val("📄 " + file.name);
            } else {
                // 🔥 fallback → stream directo
                let url = content.trim();
                currentLink = url;
                playHLS(url);
                $("#nombreCanal").text(file.name);
                updateFavButton();
            }
            // 🔥 guardar en historial (solo referencia)
            saveLocalFile(file.name, content);
            renderHistory();
            // 🔥 cerrar modal
            $("#overlay").hide();
            $("#form-container").hide();
            // 🔥 reset input (CLAVE para que vuelva a funcionar)
            $("#file-input").val("");
        };
        reader.readAsText(file);
    });

});

// ================== PARSER LOCAL ==================
function parseLocalM3U(message) {
    let lines = message.split("\n");
    let channels = [];
    let currentChannel = { name: "", url: "", group: "General" };

    lines.forEach(line => {
        line = line.trim();
        if (line.startsWith("#EXTINF")) {
            let data = getChannelData(line);
            currentChannel.name = data.name.substring(0, 30);
            currentChannel.group = data.group;
        } else if (line !== "" && !line.startsWith("#")) {
            currentChannel.url = line;
            if (currentChannel.name && currentChannel.url) {
                channels.push({
                    name: currentChannel.name,
                    url: currentChannel.url,
                    group: currentChannel.group
                });
            }
            currentChannel = { name: "", url: "", group: "General" };
        }
    });
    channelsGlobal = channels;

    $("#playList")
        .removeClass("favorites-mode")
        .empty();
    if (!channels.length) {
        $("#playList").html("⚠️ Archivo sin canales");
        return;
    }

    // 🔥 AGRUPAR IGUAL QUE loadChannels
    let grouped = {};

    channels.forEach(ch => {
        if (!grouped[ch.group]) grouped[ch.group] = [];
        grouped[ch.group].push(ch);
    });

    for (let group in grouped) {

        $("#playList").append(`
            <div class="group-title">${group}</div>
        `);

        grouped[group].forEach(channel => {
            $("#playList").append(`
                <button class='list-item' data-url='${channel.url}'>
                    ${channel.name}
                </button>
            `);
        });
    }

    // 🔥 reset scroll
    $("#playList").scrollTop(0);
}

// ================== SAVE LOCAL ==================
function saveLocalFile(fileName, content) {
    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
    let item = {
        name: fileName,
        url: "local-file-" + fileName,
        local: true,
        content: content // 🔥 CLAVE
    };
    history = history.filter(h => h.url !== item.url);
    history.unshift(item);
    history = history.slice(0, 10);
    localStorage.setItem("m3uHistory", JSON.stringify(history));
}

</script>
 
    
<script>
function esDesktop() {
    return !/Android|iPhone|iPad|iPod|SmartTV|TV|WebOS|Tizen/i.test(navigator.userAgent);
}

let deferredPrompt;

// 🔥 evento PWA
window.addEventListener('beforeinstallprompt', (e) => {
    if (!esDesktop()) return;
    e.preventDefault();
    deferredPrompt = e;
    $("#install-banner").fadeIn();
});

// 🔥 cuando el DOM ya existe
$(document).ready(function () {
    $("#install-banner").click(async function () {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log("Resultado instalación:", outcome);
        deferredPrompt = null;
        $("#install-banner").fadeOut();
    });

});

if (window.matchMedia('(display-mode: standalone)').matches) {
$("#install-banner").hide();
}
</script>

}
