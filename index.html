<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="description" content="Prueba de listas M3U">
    <title>Easy TV Web - M3U - V6.260521.3</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://richardbuet.github.io/EASYTVWEB/Icon-ETV.PNG">
    <link href="https://vjs.zencdn.net/7.11.4/video-js.css" rel="stylesheet" />
    <link rel="preconnect" href="https://vjs.zencdn.net">
    <link rel="preconnect" href="https://code.jquery.com">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://vjs.zencdn.net/7.11.4/video.min.js"></script>

<style>
    
.ui-dim #top-bar { opacity: 0.48;}
.ui-dim #lists { opacity: 0.62;}
.ui-dim {
    opacity: 0.68;
    transition: opacity 0.45s ease;}
.ui-awake { opacity: 1;}
#top-bar,
#lists { transition: opacity 0.45s ease;}
.list-item.active { filter: brightness(1.15);}

.vjs-poster {
    transition:
        filter 0.45s ease,
        transform 0.45s ease,
        opacity 0.45s ease;
}

#player.swipe-blur .vjs-poster {
    filter:
        blur(4px)
        brightness(0.82)
        saturate(1.08);
    transform: scale(1.00);
    opacity: 0.96;
}

:root {
    --accent: #00ffcc;
    --bg-dark: #0a0b10;
    --panel-bg: #161b22;
    --text: #e6edf3;
}
*::-webkit-scrollbar {
    width: 10px;
    height: 8px;
    margin: 0 4px;
    background: #5f9ea01c;
    border-radius: 15px;
}
*::-webkit-scrollbar-thumb {
    background-color: #74089342;
    border-radius: 15px;
    border: 2px solid #8e06d49e;
    height: 10%;
}
*:focus-visible {
    outline: #00FF00;
    outline-style: groove;
}

/* ========= SPLASH SCREEN EASYTVWEB ======== */
#splash-screen {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    flex-direction: column; /* Para poner el loader debajo del logo */
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #07111f 0%, #000814 45%, #000000 100%);
    /* Agregá esto para que respete el notch desde el inicio */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* Imagen de fondo */
/* ======= SPLASH LOGO ============ */
#splash-screen img {
    backdrop-filter: blur(8px);
    width: 320px;
    height: 320px;
    max-width: 70vw;
    max-height: 70vh;
    border-radius: 50%;
    object-fit: cover;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    animation: pulse 2.2s infinite ease-in-out;
    box-shadow:
        0 0 25px rgba(0, 180, 255, 0.25),
        0 0 60px rgba(0, 100, 255, 0.12);
}

/* Animación suave */
@keyframes pulse {
    0% {
        transform: scale(0.8);
        opacity: 0.75;
    }
    50% {
        transform: scale(1.0);
        opacity: 1;
    }
    100% {
        transform: scale(0.8);
        opacity: 0.7;
    }
}

/* Overlay oscuro para mejor estética */
#splash-screen::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,0.15),
            rgba(0,0,0,0.45)
        );
}

/* Logo opcional */
#splash-logo {
    position: absolute;
    z-index: 2;
    width: 140px;
    max-width: 40vw;
    opacity: 0.95;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
}

/* Loader opcional */
.loader {
    position: absolute;
    bottom: 60px;
    z-index: 2;
    width: 42px;
    height: 42px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #00ffd0;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* Fade out */
#splash-screen.hide {
    opacity: 0;
    pointer-events: none;
}

/* Animación loader */
@keyframes spin {
    to { transform: rotate(360deg);}
}
    
/*0. Configuración del reproductor de video*/
#install-banner {
    display: none;
    cursor: pointer;
}

/* 🎬 VIDEO (SIEMPRE ARRIBA) */
.video-js .vjs-tech {
    border-radius: 6px !important;
    z-index: 2; /* 🔥 más alto rrb */
}
.video-js .vjs-control-bar { z-index: 2;}
:not(:root):fullscreen { user-select: text; height: 100%;}

.vjs-big-play-button { 
    position: absolute;
    top: 34%!important;
    left: calc(100% / 2 - 0.65em) !important;
    margin: -25px 0px 0px -25px;
    opacity: 0.85!important;
}

.vjs-loading-spinner {
    z-index: 2;
    top: 32%!important;
    transform: scale(0.5);
}

.video-js .vjs-progress-control { 
    display: none;
}

.video-js .vjs-volume-panel .vjs-volume-control.vjs-volume-horizontal { 
    display: none !important;
}

/* 🖼 POSTER (ATRÁS) */
.vjs-poster { 
    display: flex;
    z-index: 1;
    background-size: cover;
    border-radius: 6px;
}
.video-js .vjs-tech {
    width: 100% !important;
    height: auto !important;
    aspect-ratio: 16 / 9;
    object-fit: fill;
}
.vjs-error-display {display: none !important;}
.vjs-error .vjs-error-display .vjs-modal-dialog-content {  font-size: 1.0em !important;}
.vjs-error .vjs-error-display:before { content: url(https://cdn-icons-png.flaticon.com/64/5940/5940284.png) / "OUT"; top: 31% !important; }
.video-js .vjs-big-play-button { font-size: 0!important;}
.video-js .vjs-big-play-button .vjs-icon-placeholder:before {
    content: url(https://cdn.icon-icons.com/icons2/1582/PNG/128/youtube_108041.png) / " EASYTV: ";
    SCALE: 80%;
    margin: -25px 0px 0px -25px;
    opacity: 0.85 !important;
}
/* Forzar Proporción 16:9 */
.video-js {
    width: 100% !important;
    height: auto !important;
    aspect-ratio: 16 / 9;
}

    
/* 1. Base y Reset */
html,
body {
    background: var(--bg-dark);
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100dvh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
    box-sizing: border-box;
    max-width: calc(100dvh * 2.28); 
    margin: 0 auto;
}

body {
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
}

    
/* 2. Barra Superior */
#top-bar {
    height: 50px;
    background: #010409;
    display: flex;
    align-items: center;
    justify-content: space-around;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
}
#top-bar h2 {    
    letter-spacing: 1px;
    color: var(--accent);
    margin: 10px;
    position: relative;
    font-size: larger;
    width: auto;
    text-shadow: 0 0 5px var(--bg-dark), 0 0 7px #fff, 0 0 15px #0fa;
    white-space: nowrap;
}

/* 3. Overlays del Video (Nombre e Info) */
#nombreCanal {
    top: 10px;
    left: 10px;
    z-index: 5;
    background: rgba(0, 0, 0, 0.7);
    padding: 6px 12px;
    margin-left: 10px;
    border-radius: 4px;
    color: var(--accent);
    font-size: 0.9rem;
    color: #00ffee;
    border-left: 3px solid var(--accent);
    cursor: pointer;
    user-select: none; /* Evita que se seleccione el texto azul al hacer doble clic */
    display: block;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 43px;
    flex: 1;
}

/* 4. Layout Principal (Flexbox) */
#contenedor {
    display: flex;
    justify-content: center;
    align-items: stretch;
    width: 100%;
    height: calc(100vh - 80.9px);
    gap: 10px;
    margin: 0 auto;
    max-width: 1800px;
}


/* 5. Contenedor del Reproductor */
#player {
    max-width:  calc((100vh - 81px) * 16 / 9);
    position: relative;
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
}
    
#link-info-container {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    background: rgba(0,0,0,0.85);
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    font-size: 0.6rem;
    max-width: 80%;
    z-index: 6;
    word-break: break-all;
}

/* 6. Lista de Canales */
#lists {
    width: auto;
    min-width: 140px;
    max-width: 30%;
    background: var(--panel-bg);
    display: flex;
    flex-direction: column;
    border-left: 1px solid #30363d;
    font-size: 0.7em;
    user-select: none;
}
#search-bar { 
    padding: 10px; 
    display: flex; 
    gap: 5px; 
    background: #0d1117; 
}
#search { 
    flex: 1; background: #010409; border: 1px solid #30363d; 
    color: #fff; padding: 8px; border-radius: 4px; min-width: 55%;
}

#controls-bar{
    display:flex;
    gap:3px;
    padding:3px;
    margin: 0 10px;
    background:#11161d;
    border-top:1px solid #30363d;
    border-bottom:1px solid #30363d;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
}

.control-btn{
    background:#21262d;
    border:1px solid #30363d;
    color:#00ffcc;
    border-radius:8px;
    min-width:38px;
    width: -webkit-fill-available;
    height:38px;
    cursor:pointer;
    transition:0.2s;
    scroll-snap-align:start;
}

.control-btn:hover {
    background: #30363d;
    border-color: #00ffcc;
}

#auto-next-btn {
    border-radius: 8px;
    color: #00ffcc;
    font-size: 0.8em;
    padding: 3px;
    cursor: pointer;
}

#voice-btn {
    border-radius: 8px;
    background: #21262d;
    color: #00ffcc;
    cursor: pointer;
    min-width: 40px;
}

#voice-btn.listening {
    background: blue;
    color: white;
    animation: pulseMic 1s infinite;
}

@keyframes pulseMic {
    0% { transform: scale(1);    }
    50% { transform: scale(1.08);    }
    100% { transform: scale(1);    }
}


#playList {
    scroll-snap-type: y mandatory;
    scroll-padding-top: 3px;
    -webkit-overflow-scrolling: touch;
    overflow-y: auto;
    padding: 10px;
    flex: 1;
}

#playList div {
    scroll-snap-align: start;
    grid-column: 1 / -1;
    color: #00ffcc;
    font-weight: bold;
    padding: 5px 0;
    border-bottom: 1px solid #00ffcc33;
    -webkit-touch-callout: none; /* iOS Safari */
    -webkit-user-select: none;   /* Safari, Chrome, Opera, Android */
    -khtml-user-select: none;    /* Konqueror HTML */
    -moz-user-select: none;      /* Firefox */
    -ms-user-select: none;       /* Internet Explorer/Edge */
    user-select: none;           /* Estándar moderno */
}

/* Botones de la lista (Mejorados para TV/Móvil) */
button.list-item {
    scroll-snap-align: start;
    font-size: 0.55rem;
    width: 100%;
    min-height: 31px;
    height: calc(91% * 0.08);
    padding: 10px;
    margin: 3px 0;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    align-self: anchor-center;
    text-align: left;
    text-overflow: ellipsis;
    text-transform: uppercase;
    white-space: nowrap;
    color: var(--tex);
    transition: all 0.2s ease;
    overflow: hidden;
    cursor: pointer;
    -webkit-touch-callout: none; /* iOS Safari */
    -webkit-user-select: none;   /* Safari, Chrome, Opera, Android */
    -khtml-user-select: none;    /* Konqueror HTML */
    -moz-user-select: none;      /* Firefox */
    -ms-user-select: none;       /* Internet Explorer/Edge */
    user-select: none;           /* Estándar moderno */
}

@media (hover: hover) and (pointer: fine) {
    button.list-item:hover, 
    button.list-item:focus {
        background: #30363d;
        border-color: var(--accent);
        outline: none;
    }
}
    
button.list-item.active {
    background: rgba(0, 255, 204, 0.1);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: bold;
    font-size: 0.59rem;
}

#playList.favorites-mode {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-content: flex-start;
}

#playList.favorites-mode .list-item {
    width: 100%;
    font-size: 0.65rem;
}

@media (max-width: 480px) {
    #playList.favorites-mode .list-item { 
        width: calc(50% - 6px); /* 2 columnas */
    }
}
    
/* 7. Modal (Formulario de carga) - ARREGLADO */
#overlay {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background: rgba(0,0,0,0.8); 
    z-index: 100; display: none;
    backdrop-filter: blur(4px);
}

#menu-flotante {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-height: 80vh;
    max-width: 500px;
    background: var(--panel-bg);
    padding: 20px;
    border-radius: 12px;
    z-index: 101;
    display: flex;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    border: 1px solid #30363d;
    flex-direction: column;
    justify-content: flex-start;
}

#m3u-url {
    width: 100%; 
    background: #010409; 
    color: var(--accent);
    border: 1px solid #30363d; 
    padding: 10px; 
    border-radius: 6px;
    box-sizing: border-box; 
    margin-bottom: 10px;
}
#form-btn { 
    display: grid; 
    grid-template-columns: 1fr 1fr 1fr; 
    gap: 6px; 
}
.form-btn { 
    padding: 5px 0; 
    border-radius: 6px; 
    border: 1px solid #30363d; 
    background: #21262d; 
    color: #fff; 
    cursor: pointer; 
    font-size: 0.7rem; 
}
#ok-button { 
    background: var(--accent); 
    color: #000; 
    font-weight: bold; 
}
#preset-lists{
    margin-top: 10px;
    gap: 6px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    border-radius: 3px;
}
.preset {
    font-size: 0.7rem;
    background: lavender;
    border-style: none;
    border-radius: 3px;
    padding: 5px 0;
    cursor: pointer;
}
#m3u-history{
    display: flex;
    flex-wrap: nowrap;
    align-content: flex-start;
    gap: 4px;
    margin-top: 8px;
    overflow-y: auto;
    height: 100px;
    flex-direction: column;
    justify-content: flex-start;
    color: limegreen;
}
.history-item{
    font-size: small;
    border: 1px solid #30363d;
    border-radius: 6px;
    width: stretch;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 2px 0;
}

/* 8. RESPONSIVE (Móvil - Vertical) */
@media  (max-aspect-ratio: 1.40) {
        #contenedor {
        height: calc(100dvh - 50px);
        flex-direction: column;
        overflow: hidden;
    }
        #playList {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: calc(100vh / 50);
        padding-top: 2px;
        height: auto !important;
        gap: 0.5rem;
        align-content: flex-start;   /* 🔥 clave */
        grid-auto-rows: max-content;
        max-width: auto;
    }
    #lists {
        display: flex;
        flex-direction: column;
        scroll-snap-type: y mandatory;
        overflow: auto;
        overflow-x: hidden;
        width: -webkit-fill-available;
        z-index: 2;
        list-style: none;
        max-width: 100%;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        flex: 1;
        height: auto;
        min-height: 0; 
    }
    html, body {
        overflow: hidden;
        height: 100dvh;
    }
    #player {
        width: 99.5vw;
        align-self: center;
        height: calc(100vw * 9 / 16);
        max-width: none;
    }
    #link-info-container {
        bottom: 50%;
    }
    #m3u-history{
        height: auto;
        max-height: 20vh;
    }
}

/* 9. Adaptación Android TV */
@media (hover: none) {
    button.list-item:focus { }
}

.is-fav {
    border-color: gold !important;
}

.fav-item {
    display: flex;
    gap: 6px;
    align-items: center;
}

#fav-btn {
    position: relative;
    top: auto;
    right: auto;
    width: 38px;
    height: 38px;
    margin-right: 5px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: 1px solid gold;
    border-radius: 8px;
    font-size: 18px;
}


</style>


</head>

<script>
// ================== VARIABLES ==================
let autoNextEnabled = true;
let channelsGlobal = [];
//let currentIndex = 0;
let currentLink = null;
// let preloadController = null;
let isAutoSearching = false;
window.showingFavorites = false;
const defaultM3U = "https://richardbuet.github.io/EASYTVWEB/AIO260501V1.m3u";
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    
// ================== FAVORITOS ==================
function saveFavorites() {
    localStorage.setItem("favorites", JSON.stringify(favorites));
}

function toggleFavoriteCurrent() {
    if (!currentLink) return;
    let name = $("#nombreCanal").text();
    let index = favorites.findIndex(f => f.url === currentLink);
    if (index !== -1) {
        favorites.splice(index, 1);
    } else {
        favorites.push({ name, url: currentLink });
    }
    saveFavorites();
    updateFavButton();
    // 🔥 REFRESCAR SI ESTÁS EN FAVORITOS
    if (window.showingFavorites) {
        renderFavorites();
    }
}

function updateFavButton() {
    let exists = favorites.some(f => f.url === currentLink);
    $("#fav-btn").text(exists ? "✔" : "⭐");
}

function marcarCanalActivo() {
    if (!currentLink) return;
    // 🔥 LIMPIEZA GLOBAL REAL
    document.querySelectorAll(".list-item.active")
        .forEach(el => el.classList.remove("active"));
    //let btn = document.querySelector(`.list-item[data-url="${currentLink}"]`);
    let btn = [...document.querySelectorAll(".list-item")]
    .find(el => el.dataset.url === currentLink);
    // arriba, corrige errores de enter entre extensión y #EXT Siguiente
    if (btn) {
        btn.classList.add("active");
    }
}

// ================== NRO CANAL ==================
function updateChannelCount() {
    let visible = $("#playList .list-item:visible").length;
    let total = $("#playList .list-item").length;

    $("#channel-count").text(`[CH:${visible}/${total}]`);
}

// =============== 🔍 BUSCADOR ===============
$("#search")
.on("focus", function() {
    this.select();
})
.on("input", function() {
    let value = $(this).val().toLowerCase();
    $("#no-results").remove();
    $("#playList button").each(function() {
        let match = $(this).text().toLowerCase().includes(value);
        $(this).css("display", match ? "" : "none");
    });
    $("#playList .group-title").each(function() {
        let group = $(this);
        let hasVisible = group
            .nextUntil(".group-title")
            .filter("button:visible")
            .length > 0;
        group.css("display", hasVisible ? "" : "none");
    });

    if ($("#playList button:visible").length === 0) {
        $(".group-title").hide();
        $("#playList").append(`
            <div id="no-results" style="text-align:center; padding:10px;">
                ❌ Sin resultados
            </div>
        `);
    }
    if (value === "") {
        $("#playList button").show();
        $("#playList .group-title").show();
        $("#no-results").remove();
    }
});

// ================== PLAYER ==================
function playHLS(url) {
    var player = videojs('my-video');
    // 🔥 limpiar eventos anteriores (MUY IMPORTANTE)
    player.off('waiting');
    player.off('playing');
    player.off('loadeddata');
    handlePlayerError();
    player.pause();
    let type = "application/x-mpegURL";
    if (url.endsWith(".mp4")) {
        type = "video/mp4";
    } else if (url.endsWith(".mp3")) {
        type = "audio/mpeg";
    } else if (url.endsWith(".ts")) {
        type = "video/mp2t";
    } else if (url.endsWith(".m3u8")) {
        type = "application/x-mpegURL";
    }

    player.src({ src: url, type: type });
    player.play();
    currentLink = url;

    //  POSTER HELPER 
    function setPoster(show) {
        let el = document.querySelector(".vjs-poster");
        if (!el) return;
        el.style.setProperty(
            "display",
            show ? "flex" : "none",
            "important"
        );
    }
    // 🔥 mostrar poster al iniciar
    if (!isAutoSearching) {
        setPoster(true);
        $("#link-info-container")
            .html("🔄 Buscando señal...")
            .show();
    }

    //  EVENTOS 
    // 🔥 iPhone FIX (más confiable que playing)
    player.on('loadeddata', function () {
        setPoster(false);
    });
    // 🔥 cuando empieza a reproducir
    player.on('playing', function () {
        $("#link-info-container").fadeOut();
        setPoster(false);
    });
    // 🔥 buffering
    player.on('waiting', function () {
        if (!isAutoSearching) {
            setPoster(true);

            $("#link-info-container")
                .html("🔄 Cargando...")
                .show();
        }
    });
    // 🔥 error
    player.on('error', function () {
        if (!isAutoSearching) {
            setPoster(true);
            $("#link-info-container")
                .html("🔥 Señal fuera de servicio")
                .show();
        }
    });
}

// ================== PARSER ==================
function getChannelData(line) {
    const nameMatch = line.match(/,(.*)/);
    const groupMatch = line.match(/group-title="([^"]*)"/);
    let name = nameMatch ? nameMatch[1].trim() : "Unknown";
    let group = groupMatch ? groupMatch[1].trim() : "Canales Generales";
    if (!group ||
        group.toLowerCase() === "undefined" ||
        group.toLowerCase() === "n/a" ||
        group.toLowerCase() === "none"
    ) {
        group = "Canales de TV";
    }
    return { name, group };
}

// ================== CARGA LISTA ==================
function loadChannels(url) {
    // 🔥 SALIR DE FAVORITOS SI CARGO NUEVA LISTA
    window.showingFavorites = false;
    $("#playList").removeClass("favorites-mode");
    // 🔄 loading con estilo
    $("#playList").html(`<div class="loading-list">⏳ Cargando lista...</div>`);
    $.ajax({
        type: "GET",
        url: url,
      //  url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
        timeout: 15000,
        success: function (message) {
            let lines = message.split("\n");
            let channels = [];
            let currentChannel = { name: "", url: "", group: "General" };
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith("#EXTINF")) {
                    let data = getChannelData(line);
                    currentChannel.name = data.name.substring(0, 30);
                    currentChannel.group = data.group;
                } else if (line !== "" && !line.startsWith("#")) {
                    currentChannel.url = line;
                    if (currentChannel.name && currentChannel.url) {
                        let firstGroup = currentChannel.group
                            .split(";")[0]
                            .trim() || "General";
                        channels.push({
                            name: currentChannel.name,
                            url: currentChannel.url,
                            group: firstGroup
                        });
                    }
                    currentChannel = { name: "", url: "", group: "General" };
                }
            });

            // 🔥 eliminar duplicados
            let seen = new Set();
            channels = channels.filter(ch => {
                let key = ch.name + ch.group;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
            channelsGlobal = channels;
            if (channels.length === 0) {
                let name = url.split("/").pop() || "Stream";
                // 🔥 limpiar query (opcional pero recomendado)
                name = name.split("?")[0];
                // 🔥 limitar a 30 caracteres
                if (name.length > 30) {
                    name = name.substring(0, 30) + "...";
                }
                let icon = getIconByUrl(url);
                $("#playList").html(`
                    <div class="loading-list">
                        ⚠️ Lista sin canales<br><br>
                        👉 Probando como stream
                    </div>
                    <button class="list-item active" data-url="${url}">
                        ${icon} ${name}
                    </button>
                `);
                // 🔥 reproducir directo
                currentLink = url;
                playHLS(url);
                updateFavButton();
                return;
            }

            // 🔥 agrupar
            let grouped = {};
            channels.forEach(ch => {
                if (!grouped[ch.group]) grouped[ch.group] = [];
                grouped[ch.group].push(ch);
            });
            $("#playList").empty();
            for (let group in grouped) {
                $("#playList").append(`<div class="group-title">${group}</div>`);
                grouped[group].forEach(channel => {
                    $("#playList").append(`
                        <button class='list-item' data-url='${channel.url}'>
                            ${channel.name}
                        </button>
                    `);
                });
            }

            // 🔥 restaurar selección
            setTimeout(() => {
                marcarCanalActivo();
            }, 100);
            // 🔥 restaurar ventana
            $("#playList").scrollTop(0);
        },


        error: function (xhr, status, error) {
            let mensaje = "❌ Error al cargar la lista";
            // 🔥 CORS (el caso que te está pasando)
            if (xhr.status === 0) {
                mensaje = `
                    🚫 Lista bloqueada por el servidor<br><br>
                    👉 Descargala y cargar como archivo<br>
                     o usá otra fuente<br>
                `;
            }
            // ⏱️ timeout
            else if (status === "timeout") {
                mensaje = "⏱️ La carga tardó demasiado";
            }
            // ❌ 404
            else if (xhr.status === 404) {
                mensaje = "❌ Lista no encontrada";
            }
            $("#playList").html(`
                <div style="text-align:center; padding:20px;">
                    ${mensaje}
                    <br><br>
                    <button onclick="cargarDefault()">🔄 Lista original</button>
                </div>
            `);
        }

    });
}

// ============= 🔁 VOLVER A LISTA ORIGINAL ==========
function cargarDefault() {
    $("#m3u-url").val(defaultM3U);
    loadChannels(defaultM3U);
};

// ================== FAVORITOS VIEW ==================
function renderFavorites() {
    let data = JSON.parse(localStorage.getItem("favorites")) || [];
    $("#playList").empty().addClass("favorites-mode");
    if (!data.length) {
        $("#playList").html("⭐ Sin favoritos");
        return;
    }
    channelsGlobal = data;
    data.forEach(c => {
        $("#playList").append(`
            <button class="list-item" data-url="${c.url}">
                ${c.name}
            </button>
        `);
    });
    setTimeout(() => {
    marcarCanalActivo();
    }, 100);
}

// ================== HISTORIAL ==================
function saveM3U(url) {
    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
    let shortName;
    try {
        let u = new URL(url);
        let file = u.pathname.split("/").pop() || "lista";
        shortName = u.hostname + " / " + file;
    } catch {
        shortName = url; // fallback si no es URL válida
    }
    history = history.filter(h => h.url !== url);
    history.unshift({
        name: shortName,
        url: url
    });
    history = history.slice(0, 15);
    localStorage.setItem("m3uHistory", JSON.stringify(history));
}

function renderHistory() {
    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
    $("#m3u-history").empty();
    history.forEach(h => {
        let displayName;
        // 🔥 SI ES LOCAL
        if (h.url.startsWith("local-file-")) {
            displayName = h.name;
        } else {
            try {
                let u = new URL(h.url);
                let file = u.pathname.split("/").pop() || "lista";
                displayName = u.hostname + " / " + file;
            } catch {
                displayName = h.url;
            }
        }
        let icon = h.url.startsWith("local-file-") ? "📂" : "🌐";
        $("#m3u-history").append(`
            <div class="history-item" data-url="${h.url}" >
                <span style="flex:1; overflow:hidden; text-overflow:ellipsis;">
                    ${icon} ${displayName}
                </span>
                <span class="delete-history" data-url="${h.url}" style="cursor:pointer; color:red; margin-left:8px;">
                    ❌
                </span>
            </div>
        `);
    });
}

// ================== AUTO NEXT ==================
function getVisibleChannels() {
    let list = [];
    $("#playList .list-item:visible").each(function () {
        list.push({
            name: $(this).text(),
            url: $(this).data("url")
        });
    });
    return list;
}

// ================== ERRORES ==================
function handlePlayerError() {
    var player = videojs('my-video');
    player.off('error'); // 🔥 evitar duplicados
    player.on('error', function () {
        player.pause();
        if (!autoNextEnabled) {
            // 🔥 SOLO mostrar error si NO está buscando
            if (!isAutoSearching) {
                $("#link-info-container")
                    .html("🔥 Señal fuera de servicio")
                    .show();
            }
            return;
        }
        let attempts = 0;
        const MAX_ATTEMPTS = 10;
        isAutoSearching = true; // 🔥 ACTIVAR MODO BÚSQUEDA
        function tryNext() {
            let visibleList = getVisibleChannels();
            let currentPos = visibleList.findIndex(c => c.url === currentLink);
            if (currentPos === -1) return;
            let nextIndex = currentPos + 1;
            if (nextIndex >= visibleList.length || attempts >= MAX_ATTEMPTS) {
                console.log("No se encontró canal válido");
                autoNextEnabled = false;
                isAutoSearching = false; // 🔥 DESACTIVAR
                $("#link-info-container")
                    .html("❌ No se encontró señal disponible 📡")
                    .show();
                return;
            }
            let next = visibleList[nextIndex];
            console.log("🔄 Probando:", next.name);
            // 🔥 mensaje visual
            $("#link-info-container")
                .stop(true, true)
                .html(`<div style="display:block;">🔄 Probando:<br><b>${next.name}</b></div>`)
                .show()
            // 🔥 actualizar estado
            currentLink = next.url;
            playHLS(next.url);
            $("#nombreCanal").text(next.name);
            marcarCanalActivo();
            attempts++;
            setTimeout(() => {
            isAutoSearching = false;
            $("#link-info-container").fadeOut();
            }, 2500);
        }
        tryNext();
    });
    // 🔥 cuando el video arranca correctamente
    player.on('playing', function () {
        isAutoSearching = false;
            $("#link-info-container")
        .stop(true, true)
        .fadeOut();
    });
}

// ============== FORMATOS ==================
function getIconByUrl(url) {
    if (url.startsWith("local-file-")) return "📂";
    if (url.includes(".m3u8")) return "📺";
    if (url.includes(".mp4")) return "🎬";
    if (url.includes(".mp3")) return "🎧";
    if (url.includes(".ts")) return "📡";
    return "🌐";
}

// ================ PLAY DIRECT ===============
function playDirectStream(url) {
    currentLink = url;
    let player = videojs('my-video');
    player.pause();
    player.src({
        src: url,
        type: url.includes(".m3u8") ? "application/x-mpegURL" : "video/mp4"
    });
    // 🔥 AUTOPLAY
    player.ready(function () {
        player.muted(true);
        player.play().catch(() => {});
    });
    let name = url.split("/").pop() || "Stream";
    let icon = getIconByUrl(url);
    let type = (url.match(/\.(m3u8|mp4|mp3|ts)/i) || [""])[0]
        .replace(".", "")
        .toUpperCase();
    $("#nombreCanal").html(`
        ${icon} ${name}<br>
        <small style="color:#aaa;">${type}</small>
    `);
    // 🔥 PLAYLIST UI
    $("#playList")
        .removeClass("favorites-mode")
        .empty()
        .append(`
            <button class="list-item active" data-url="${url}">
                ${icon} ${name}
            </button>
        `);
    updateFavButton();
    marcarCanalActivo();
}
// ============= DETECTAR SWIPE =============
function triggerChannelTransition() {
    $("#player").addClass("swipe-blur");
    setTimeout(() => {
        $("#player").removeClass("swipe-blur");
    }, 280);
}

// ============= COMANDO DE VOZ =============
function nextChannel() {
triggerChannelTransition();
    let visibleChannels =
        $("#playList .list-item:visible");
    if (!visibleChannels.length) return;
    let currentPos = visibleChannels.index(
        $(`.list-item[data-url="${currentLink}"]`)
    );
    if (currentPos < 0) currentPos = 0;
    let nextIndex = currentPos + 1;
    if (nextIndex >= visibleChannels.length) {
        nextIndex = 0;
    }
    visibleChannels.eq(nextIndex).click();
}

function prevChannel() {
triggerChannelTransition();
    let visibleChannels =
        $("#playList .list-item:visible");
    if (!visibleChannels.length) return;
    let currentPos = visibleChannels.index(
        $(`.list-item[data-url="${currentLink}"]`)
    );
    if (currentPos < 0) currentPos = 0;
    let prevIndex = currentPos - 1;
    if (prevIndex < 0) {
        prevIndex = visibleChannels.length - 1;
    }
    visibleChannels.eq(prevIndex).click();
}

function togglePlayPause() {
    let player = videojs('my-video');
    if (player.paused()) {
        player.play();
    } else {
        player.pause();
    }
}

function toggleMute() {
    let player = videojs('my-video');
    const muted = !player.muted();
    player.muted(muted);
    $("#mute-btn").text(
        muted ? "🔇" : "🔊"
    );
}

function volumeUp() {
    let player = videojs('my-video');
    player.volume(
        Math.min(player.volume() + 0.1, 1)
    );
}

function volumeDown() {
    let player = videojs('my-video');
    player.volume(
        Math.max(player.volume() - 0.1, 0)
    );
}

function toggleFullscreen() {
    let player = videojs('my-video');
    if (player.isFullscreen()) {
        player.exitFullscreen();
    } else {
        player.requestFullscreen();
    }
}

// ================== READY ==================
$(document).ready(function () {
    $("#auto-next-btn").text("Auto ▶ ON");
    loadChannels(defaultM3U);
    renderHistory();
    handlePlayerError();
    $("#link-info-container").hide();
    $("#export-fav").click(function () {
        exportCurrentList();
    });

    // ================== INFO ==================
    $("#nombreCanal").click(function (e) {
        e.stopPropagation();
        if (!currentLink) return;
        $("#link-info-container")
            .html(currentLink)
            .show()
            .fadeOut(7500);
    });

    $("#nombreCanal").dblclick(function (e) {
        e.stopPropagation();
        if (!currentLink) return;
        navigator.clipboard.writeText(currentLink)
        .then(() => {
            $("#link-info-container")
                .html("📋 Link copiado")
                .show()
                .fadeOut(2500);
        })
        .catch(() => {
            alert("No se pudo copiar");
        });
    });

    // ================== MODAL =================
    $("#top-bar h2").click(function () {
        $("#overlay, #menu-flotante").show();
    });
    $("#exit-button").click(function () {
        $("#overlay, #menu-flotante").hide();
    });

    // ============= close windows V2 ============
    function closeForm() {
        $("#overlay, #menu-flotante").hide();
    }

    $(document).on("keydown", function (e) {
        if ((e.key === "Escape" || e.keyCode === 27) && $("#menu-flotante").is(":visible")) {
            closeForm();
        }
    });
    $("#exit-button, #overlay").click(closeForm);
    $("#clear-button").click(function () {
        $("#m3u-url").val("");
    });

    // ================= PEGAR =================
    $("#paste-button").click(async function () {
        try {
            const text = await navigator.clipboard.readText();
            $("#m3u-url").val(text);
        } catch {
            alert("No se pudo acceder al portapapeles");
        }
    });

    // ================== CARGAR =================
    $("#ok-button").click(function () {
        let url = $("#m3u-url").val().trim();
        if (!url) return;
        if (url.startsWith("📂")) {
            $("#overlay, #menu-flotante").hide();
            return;
        }
        if (url.match(/\.(m3u8|mp4|mp3|ts)(\?|$)/i)) {
            playDirectStream(url);
        } else {
            loadChannels(url);
        }
        saveM3U(url);
        renderHistory();
        $("#overlay, #menu-flotante").hide();
    });

    // =============== ENTER = CARGAR ==============
    $("#m3u-url").on("keydown", function (e) {
        if (e.key === "Enter") {
            e.preventDefault();
            $("#ok-button").click();
        }
    });

    // ================= HISTORIAL =================
    $("#m3u-history").on("click", ".history-item", function () {
        let url = $(this).data("url");
        let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
        let item = history.find(h => h.url === url);
        if (!item) return;
        if (url.startsWith("local-file-") && item.content) {
            parseLocalM3U(item.content);
            $("#nombreCanal").text(item.name);
        } else if (url.match(/\.(m3u8|mp4|mp3|ts)(\?|$)/i)) {
            playDirectStream(url);
        } else {
            loadChannels(url);
        }
        $("#overlay, #menu-flotante").hide();
    });

    // ================= DEFAULT ================
    $("#default-button").click(function () {
        loadChannels(defaultM3U);
        $("#overlay, #menu-flotante").hide();
    });

    // ================= PRESETS =================
    $(".preset").click(function () {
        loadChannels($(this).data("url"));
        $("#overlay, #menu-flotante").hide();
    });

    // ============= HISTORIAL CLICK =============
    $("#m3u-history").on("click", ".history-item", function () {
        let url = $(this).data("url");
        let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
        let item = history.find(h => h.url === url);
        if (!item) return;

        // 🔥 CLAVE: detectar local
        if (item.url.startsWith("local-file-") && item.content) {
            parseLocalM3U(item.content);
            $("#nombreCanal").text(item.name);
        } else {
            $("#m3u-url").val(item.url);
            loadChannels(item.url);
        }
        $("#overlay").hide();
        $("#menu-flotante").hide();
    });

    // ============= BORRAR HISTORIAL =============
    $("#clear-history").click(function () {
        if (confirm("¿Borrar historial?")) {
            localStorage.removeItem("m3uHistory");
            renderHistory();
        }
    });

    // ================ FAVORITOS =================
    $("#favorites-button").click(function () {
        window.showingFavorites = true;
        renderFavorites();
        $("#overlay, #menu-flotante").hide();
    });

    $("#fav-btn").click(toggleFavoriteCurrent);

    // ================ CLICK CANAL ================ 
    $("#playList").on("click", ".list-item", function() {
        triggerChannelTransition();
        let url = $(this).data("url");
        let nombre = $(this).text();
        currentLink = url; // 🔥 MUY IMPORTANTE
        playHLS(url);
        $("#nombreCanal").text(nombre);
        updateFavButton();
        marcarCanalActivo(); // 🔥 ESTA ES LA LÍNEA CLAVE
    });

    // ================ AUTO NEXT BTN ================ 
    $("#auto-next-btn").click(function () {
        autoNextEnabled = !autoNextEnabled;
        $(this).text(autoNextEnabled ? "Auto ▶ ON" : "Auto ▶ OFF");
    });

    // ============ ELIMINAR DEL HOSTORIAL ============ 
    $("#m3u-history").on("click", ".delete-history", function (e) {
        e.stopPropagation(); // 🔥 evita que cargue la lista
        if (!confirm("¿Eliminar del historial?")) return;
        let url = $(this).data("url");
        let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
        history = history.filter(h => h.url !== url);
        localStorage.setItem("m3uHistory", JSON.stringify(history));
        renderHistory();
    });

    // ================== CONTROLES ==================
    $("#next-btn").click(nextChannel);
    $("#prev-btn").click(prevChannel);
    $("#playpause-btn").click(togglePlayPause);
    $("#mute-btn").click(toggleMute);
    $("#vol-up-btn").click(volumeUp);
    $("#vol-down-btn").click(volumeDown);
    $("#fullscreen-btn").click(toggleFullscreen);



    // ============ SWIPE ENTRE CANALES =================
    let touchStartX = 0;
    let touchEndX = 0;
    const videoContainer = document.querySelector("#player");

    // TOUCH START
    videoContainer.addEventListener("touchstart", (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    // TOUCH END
    videoContainer.addEventListener("touchend", (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, { passive: true });

    
    function handleSwipe() {
        const distance = touchEndX - touchStartX;
        // evitar movimientos accidentales
        if (Math.abs(distance) < 60) return;
            triggerChannelTransition();
        // lista REAL visible
        let visibleChannels = $("#playList .list-item:visible");
        if (!visibleChannels.length) return;
        // canal actual REAL visible
        let currentPos = visibleChannels.index(
            $(`.list-item[data-url="${currentLink}"]`)
        );
        // fallback
        if (currentPos < 0) currentPos = 0;
        // 👉 siguiente canal
        if (distance < 0) {
            let nextIndex = currentPos + 1;
            if (nextIndex >= visibleChannels.length) {
                nextIndex = 0;
            }
            visibleChannels.eq(nextIndex).click();
        }
        // 👉 canal anterior
        else {
            let prevIndex = currentPos - 1;
            if (prevIndex < 0) {
                prevIndex = visibleChannels.length - 1;
                }
                visibleChannels.eq(prevIndex).click();
            }
    }   
});
// ============= 👊🏼 FIN DEL READY 👊🏼 ============

// ============ AI DE VOZ =============
let voiceActive = false;
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

if (isIOS) { $("#voice-btn").hide(); }
    const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

if (SpeechRecognition && !isIOS) {
    const recognition = new SpeechRecognition();
    recognition.lang = "es-AR";
    recognition.continuous = false;
    recognition.interimResults = false;
    $("#voice-btn").on("click", function () {
    if (voiceActive) {
            recognition.stop();
            voiceActive = false;
            $(this).removeClass("listening");
            return;
        }
        recognition.start();
        voiceActive = true;
        $(this).addClass("listening");
    }); 

    recognition.onresult = (event) => {
        const text =
            event.results[0][0].transcript
            .toLowerCase();
        console.log("🎤", text);
        // SIGUIENTE
        if (
            text.includes("siguiente") ||
            text.includes("próximo")
        ) {
            nextChannel();
        }
        // ANTERIOR
        else if (
            text.includes("anterior")
        ) {
            prevChannel();
        }
        // VOLUMEN ARRIBA
        else if (
            text.includes("subir volumen")
        ) {
            let player = videojs('my-video');
            player.volume(
                Math.min( player.volume() + 0.1, 1 )
            );
        }
        // VOLUMEN ABAJO
        else if (
            text.includes("bajar volumen")
        ) {
            let player = videojs('my-video');
            player.volume(
                Math.max(
                    player.volume() - 0.1, 0 )
            );
        }
        // PLAY
        else if (
            text.includes("play")
        ) {
            videojs('my-video').play();
        }
        // PAUSA
        else if (
            text.includes("pausa")
        ) {
            videojs('my-video').pause();
        }
        // FULLSCREEN
        else if (
            text.includes("pantalla completa")
        ) {
            let player = videojs('my-video');
            if (player.isFullscreen()) {
                player.exitFullscreen();
            } else {
                player.requestFullscreen();
            }

        }
    };

    recognition.onend = () => {
     voiceActive = false;
        $("#voice-btn")
            .removeClass("listening");
    };

    recognition.onerror = () => {
     voiceActive = false;
        $("#voice-btn")
            .removeClass("listening");
    };
}
    
// ================== TÍTULO DINÁMICO ==================
function actualizarTitulo() {
    let el = document.getElementById("nombreCanal");
    let nombre = el?.textContent?.trim();
    document.title = nombre ? `EASY TV - ${nombre}` : "EASY TV";
}

document.addEventListener("DOMContentLoaded", () => {
    actualizarTitulo();
    const el = document.getElementById("nombreCanal");
    if (el) {
        const observer = new MutationObserver(actualizarTitulo);
        observer.observe(el, {
            childList: true,
            subtree: true
        });
    }
});

// ================== EXPO M3U ==================
function exportCurrentList() {
    let data = [];
    // 🔥 detectar fuente
    if (window.showingFavorites) {
        data = JSON.parse(localStorage.getItem("favorites")) || [];
    } else {
        data = channelsGlobal || [];
    }
    if (!data.length) {
        alert("No hay canales para exportar");
        return;
    }
    // 🔥 nombre archivo
    let today = new Date();
    let dd = String(today.getDate()).padStart(2, '0');
    let mm = String(today.getMonth() + 1).padStart(2, '0');
    let yy = String(today.getFullYear()).slice(-2);
    let fileName = "lista.m3u";
    if (window.showingFavorites) {
        fileName = `favoritos EASY TV - ${yy}.${mm}.${dd}.m3u`;
    }
    // 🔥 construir M3U limpio
    let m3u = "#EXTM3U\n";
    data.forEach(ch => {
        let name = (ch.name || "Sin nombre").trim(); // 🔥 FIX CLAVE
        let group = ch.group || (window.showingFavorites ? "Fav EasyTV" : "General");
        m3u += `#EXTINF:-1 group-title="${group}",${name}\n${ch.url}\n`;
    });
    // 🔥 descargar
    let blob = new Blob([m3u], { type: "text/plain" });
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
}
    
</script>

<script>
// ================== FILE LOCAL ==================
$(document).ready(function () {
    // 📂 botón abrir selector
    $("#file-button").click(function (e) {
        e.preventDefault();
        e.stopPropagation();
        $("#file-input").click();
    });

    // 📂 leer archivo seleccionado
    $("#file-input").on("change", function (e) {
        let file = e.target.files[0];
        if (!file) return;

        let reader = new FileReader();
        reader.onload = function (event) {

            let content = event.target.result;
            // 🔥 detectar playlist válida
            if (content.includes("#EXTM3U") || content.includes("#EXTINF")) {
                window.showingFavorites = false;
                parseLocalM3U(content);
                $("#nombreCanal").text(file.name);
                $("#m3u-url").val("📄 " + file.name);
            } else {
                // 🔥 fallback → stream directo
                let url = content.trim();
                currentLink = url;
                playHLS(url);
                $("#nombreCanal").text(file.name);
                updateFavButton();
            }
            // 🔥 guardar en historial (solo referencia)
            saveLocalFile(file.name, content);
            renderHistory();
            // 🔥 cerrar modal
            $("#overlay").hide();
            $("#menu-flotante").hide();
            // 🔥 reset input (CLAVE para que vuelva a funcionar)
            $("#file-input").val("");
        };
        reader.readAsText(file);
    });

});

// ================== PARSER LOCAL ==================
function parseLocalM3U(message) {
    let lines = message.split("\n");
    let channels = [];
    let currentChannel = { name: "", url: "", group: "General" };

    lines.forEach(line => {
        line = line.trim();
        if (line.startsWith("#EXTINF")) {
            let data = getChannelData(line);
            currentChannel.name = data.name.substring(0, 30);
            currentChannel.group = data.group;
        } else if (line !== "" && !line.startsWith("#")) {
            currentChannel.url = line;
            if (currentChannel.name && currentChannel.url) {
                channels.push({
                    name: currentChannel.name,
                    url: currentChannel.url,
                    group: currentChannel.group
                });
            }
            currentChannel = { name: "", url: "", group: "General" };
        }
    });
    channelsGlobal = channels;

    $("#playList")
        .removeClass("favorites-mode")
        .empty();
    if (!channels.length) {
        $("#playList").html("⚠️ Archivo sin canales");
        return;
    }

    // 🔥 AGRUPAR IGUAL QUE loadChannels
    let grouped = {};
    channels.forEach(ch => {
        if (!grouped[ch.group]) grouped[ch.group] = [];
        grouped[ch.group].push(ch);
    });
    for (let group in grouped) {
        $("#playList").append(`
            <div class="group-title">${group}</div>
        `);
        grouped[group].forEach(channel => {
            $("#playList").append(`
                <button class='list-item' data-url='${channel.url}'>
                    ${channel.name}
                </button>
            `);
        });
    }
    // 🔥 reset scroll
    $("#playList").scrollTop(0);
}

// ================== SAVE LOCAL ==================
function saveLocalFile(fileName, content) {
    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];
    let item = {
        name: fileName,
        url: "local-file-" + fileName,
        local: true,
        content: content // 🔥 CLAVE
    };
    history = history.filter(h => h.url !== item.url);
    history.unshift(item);
    history = history.slice(0, 10);
    localStorage.setItem("m3uHistory", JSON.stringify(history));
}

</script>
 
    
<script>
function esDesktop() {
    return !/Android|iPhone|iPad|iPod|SmartTV|TV|WebOS|Tizen/i.test(navigator.userAgent);
}
let deferredPrompt;

// 🔥 evento PWA
window.addEventListener('beforeinstallprompt', (e) => {
    if (!esDesktop()) return;
    e.preventDefault();
    deferredPrompt = e;
    $("#install-banner").fadeIn();
});

// 🔥 cuando el DOM ya existe
$(document).ready(function () {
    $("#install-banner").click(async function () {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log("Resultado instalación:", outcome);
        deferredPrompt = null;
        $("#install-banner").fadeOut();
    });

});

if (window.matchMedia('(display-mode: standalone)').matches) {
    $("#install-banner").hide();
}
</script>
