<style>

/* ================= BASE ================= */
body, html { 
    background: #111111; 
    overflow-x: hidden;
    overflow-y: clip;
    font-family: sans-serif;
    color: #fff; 
    height: 100vh;
    min-width: 290px;
}

/* ================= TOP ================= */
#top-bar { 
    background: #111222; 
    text-align: center; 
    padding-bottom: 10px;
}

/* ================= LAYOUT PRINCIPAL ================= */
#rl-bar{
    display: flex;
    flex-direction: row;
    gap: 10px;
    height: calc(100vh - 70px); /* 🔥 CONTROL TOTAL */
}

/* ================= PLAYER ================= */
#player {
    flex: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    width: 100%;
}

/* VIDEO CONTENEDOR */
.video-js {
    width: 100%;
    height: 100%;
    max-height: 100%;
    aspect-ratio: 16 / 9;
    position: relative;
}

/* VIDEO REAL */
.video-js .vjs-tech {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%; /* 🔥 CLAVE */
    object-fit: contain;
    z-index: 2;
}

/* ================= OVERLAY INFO ================= */
#link-info-container {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 80%;
    padding: 6px 9px;
    background-color: rgba(0,0,0,0.75);
    border-radius: 5px;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    font-size: 0.6em;
}

/* ================= LISTA ================= */
#lists { 
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    height: 100%;
}

/* GRID */
#playList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
}

/* BOTONES */
button.list-item{
    padding: 8px;
    font-size: 0.6rem;
    border-radius: 8px;
    background: linear-gradient(90deg, #14395b, #20496e);
    color: #dae6ec;
    border: 1px solid rgb(72 97 135);
}

/* ACTIVO */
.list-item.active {
    border: 2px solid #00ffcc;
    background: linear-gradient(90deg, #00ffcc33, #00ffcc66);
    color: #00ffcc;
}

/* ================= BUSCADOR ================= */
#search-bar {
    display: flex;
    gap: 6px;
    margin: 5px;
}

#search {
    flex: 7;
    padding: 6px;
    border-radius: 8px;
    background: #111;
    color: #00ffcc;
}

#auto-next-btn {
    flex: 3;
    border-radius: 8px;
}

/* ================= MOBILE VERTICAL ================= */
@media (max-aspect-ratio: 1.40) {

    #rl-bar { 
        flex-direction: column;
        height: auto;
    }

    .video-js {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
    }

    #lists {
        height: auto;
    }
}

/* ================= MOBILE HORIZONTAL (FIX REAL) ================= */
@media (orientation: landscape) and (max-width: 900px) {

    #top-bar {
        padding-bottom: 5px;
    }

    #rl-bar {
        height: calc(100vh - 50px);
    }

    #player {
        flex: 3;
    }

    #lists {
        flex: 1;
    }

    #playList {
        grid-template-columns: 1fr;
    }

    button.list-item {
        font-size: 0.55rem;
        padding: 6px;
    }
}

</style>

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {

});

// click → instalar

    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    const { outcome } = await deferredPrompt.userChoice;

    console.log("Resultado instalación:", outcome);

    deferredPrompt = null;

    $("#install-banner").fadeOut();
});

</script>

// ================== VARIABLES ==================

$("#search")
.on("focus", function() {
    this.select();
})
.on("input", function() {

    let value = $(this).val().toLowerCase();

    $("#no-results").remove();

    // 🔍 Filtrar botones
    $("#playList button").each(function() {
        let match = $(this).text().toLowerCase().includes(value);
        $(this).css("display", match ? "" : "none");
    });

    // 🔥 Ocultar grupos
    $("#playList .group-title").each(function() {

        let group = $(this);

        let hasVisible = group
            .nextUntil(".group-title")
            .filter("button:visible")
            .length > 0;

        group.css("display", hasVisible ? "" : "none");
    });

    // ⚠️ sin resultados
    if ($("#playList button:visible").length === 0) {

        $(".group-title").hide();

        $("#playList").append(`
            <div id="no-results" style="text-align:center; padding:10px;">
                ❌ Sin resultados
            </div>
        `);
    }

    // 🔄 reset
    if (value === "") {
        $("#playList button").show();
        $("#playList .group-title").show();
        $("#no-results").remove();
    }

});

function playHLS(url) {

    var player = videojs('my-video');

    // 🔥 limpiar eventos duplicados
    player.off('playing');
    player.off('waiting');

    // 🔥 pausar video actual
    player.pause();

    // 🔥 cambiar fuente directamente (SIN limpiar de más)
    player.src({
        src: url,
        type: 'application/x-mpegURL'
    });

    // 🔥 forzar play
    player.play();

    currentLink = url;

    player.on('playing', function () {
        $("#link-info-container").fadeOut();
    });

    player.on('waiting', function () {
        if (autoNextEnabled) {
            $("#link-info-container")
                .html("🔄 Buscando señal...")
                .show();
        }
    });

// SIEMPRE APARECE "BUSCANDO CANAL EN ON Y OFF"

let showingLoading = false;

    if (!showingLoading) {

        showingLoading = true;

        $("#link-info-container")
            .html("🔄 Buscando señal...")
            .show();
    }
});

player.on('playing', function () {

});

player.on('error', function () {

});

// 🧠 PARSER
function getChannelData(line) {
    const nameMatch = line.match(/,(.*)/);
    const groupMatch = line.match(/group-title="([^"]*)"/);

    let name = nameMatch ? nameMatch[1].trim() : "Unknown";
    let group = groupMatch ? groupMatch[1].trim() : "Canales Generales";

    if (!group ||
        group.toLowerCase() === "undefined" ||
        group.toLowerCase() === "n/a" ||
        group.toLowerCase() === "none"
    ) {
        group = "Canales de TV";
    }

    return { name, group };
}


// 📡 CARGA DE LISTA
function loadChannels(url) {

    $("#playList").html(`
        <div style="text-align:center; padding:20px;">
            ⏳ Cargando lista...
        </div>
    `);

    $.ajax({
        type: "GET",
        url: url,
        timeout: 10000,

        success: function (message) {

            let lines = message.split("\n");
            let channels = [];
            let currentChannel = { name: "", url: "", group: "General" };

            lines.forEach(line => {
                line = line.trim();

                if (line.startsWith("#EXTINF")) {
                    let data = getChannelData(line);
                    currentChannel.name = data.name;
                    currentChannel.group = data.group;

                } else if (line !== "" && !line.startsWith("#")) {

                    currentChannel.url = line;

                    if (currentChannel.name && currentChannel.url) {
                        let groups = currentChannel.group.split(";");

                        groups.forEach(g => {
                            channels.push({
                                name: currentChannel.name,
                                url: currentChannel.url,
                                group: g.trim() || "General"
                            });
                        });
                    }

                    currentChannel = { name: "", url: "", group: "General" };
                }
            });

            // 🔥 eliminar duplicados (FIX)
            let seen = new Set();
            channels = channels.filter(ch => {
                let key = ch.name + ch.group;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            // 🔥 GUARDAR LISTA GLOBAL (CLAVE)
            channelsGlobal = channels;

            if (channels.length === 0) {
                $("#playList").html(`⚠️ Lista sin canales`);
                return;
            }

            // 🔥 AGRUPAR
            let grouped = {};

            channels.forEach(ch => {
                if (!grouped[ch.group]) grouped[ch.group] = [];
                grouped[ch.group].push(ch);
            });

            // 🎛️ RENDER
            $("#playList").empty();

            for (let group in grouped) {

                $("#playList").append(`
                    <div class="group-title" style="color:#00ffcc; font-weight:bold; margin-top:10px;">
                        ${group}
                    </div>
                `);

                grouped[group].forEach(channel => {
                    $("#playList").append(`
                        <button class='list-item' data-url='${channel.url}'>
                            ${channel.name}
                        </button>
                    `);
                });
            }
        },

        error: function (xhr, status, error) {

            let mensaje = "❌ Error al cargar la lista";

            if (status === "timeout") mensaje = "⏱️ La carga tardó demasiado";
            if (xhr.status === 404) mensaje = "❌ Lista no encontrada";

            $("#playList").html(`
                <div style="text-align:center; padding:20px;">
                    ${mensaje}<br>
                    <button onclick="cargarDefault()">🔄 Lista original</button>
                </div>
            `);
        }
    });
};


// 🔁 VOLVER A LISTA ORIGINAL
function cargarDefault() {
    $("#m3u-url").val(defaultM3U);
    loadChannels(defaultM3U);
};


// 🎛️ EVENTOS
$(document).ready(function () {

    $("#link-info-container").hide(); 
    loadChannels(defaultM3U);
    renderHistory();

    // ▶️ CLICK CANAL
    $("#playList").on('click', 'button', function() {

        // 🔥 índice correcto
        currentIndex = channelsGlobal.findIndex(c => c.url === url);

        let url = $("#m3u-url").val().trim();
        if (url !== "") {

            renderHistory();   //opción nueva
            $("#overlay").hide();
            $("#form-container").hide();
        } else {

        }
    });

    // 🔄 DEFAULT
    $("#default-button").click(function () {

    });

    // 🧹 LIMPIAR
    $("#clear-button").click(function () {

    });

    // ❌ CERRAR
    $("#exit-button").click(function () {
        $("#overlay").hide();
        $("#form-container").hide();
    });

    // ⭐ LISTAS RÁPIDAS
    $(".preset").click(function () {
        let url = $(this).data("url");

        $("#m3u-url").val(url);
        loadChannels(url);

        $("#overlay").hide();
        $("#form-container").hide();
    });




    // 🔗 VER LINK
    // $("#nombreCanal").click(function() {
    //     $("#link-info-container").text(currentLink).show();
    //     setTimeout(() => $("#link-info-container").hide(), 5000);
    // });
    $("#nombreCanal").click(function() {

    if (!currentLink) return; // 🔥 clave

    $("#link-info-container")
        .text(currentLink)
        .show();

    setTimeout(() => $("#link-info-container").hide(), 5000);
});

var player = videojs('my-video');

player.on('error', function() {

    console.log("Error de señal");

    player.pause();

    // 🖼 mostrar poster
    player.poster("https://img.freepik.com/free-photo/modern-home-interior-with-comfortable-sofa-window-generative-ai_188544-19459.jpg");

    if (autoNextEnabled) {

        let attempts = 0;

        function tryNext() {

            currentIndex++;

            if (currentIndex >= channelsGlobal.length || attempts > 10) {
                console.log("No se encontró canal válido");
                return;
            }

            let next = channelsGlobal[currentIndex];

            console.log("Probando:", next.name);

            $(".list-item").removeClass("active");

$("#paste-button").click(async function () {

        alert("No se pudo acceder al portapapeles");
    }
});


function saveM3U(url) {

    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];

    let u = new URL(url);

    let file = u.pathname.split("/").pop() || "lista";
    let shortName = u.hostname + " / " + file;

    let item = {
        name: shortName,
        url: url
    };

    // 🔥 evitar duplicados por URL completa
    history = history.filter(h => h.url !== url);

    // 🔥 agregar al inicio
    history.unshift(item);

    // 🔥 limitar a 5 elementos
    history = history.slice(0, 5);

    // 🔥 guardar
    localStorage.setItem("m3uHistory", JSON.stringify(history));
}



function renderHistory() {

    let history = JSON.parse(localStorage.getItem("m3uHistory")) || [];

    $("#m3u-history").empty();

    history.forEach(item => {
        $("#m3u-history").append(`
            <div class="history-item" data-url="${item.url}">
                🔗 ${item.name}
            </div>
        `);
    });
}

$("#m3u-history").on("click", ".history-item", function () {

    let url = $(this).data("url");

    $("#m3u-url").val(url);
    loadChannels(url);

    $("#overlay").hide();
    $("#form-container").hide();
});

$("#clear-history").click(function () {

    if (confirm("¿Borrar historial de listas?")) {

        localStorage.removeItem("m3uHistory");

        renderHistory(); // refresca UI

        $("#m3u-url").val(""); // opcional limpiar input
    }
    if (!localStorage.getItem("m3uHistory")) {
    $("#clear-history").hide();
}
});
